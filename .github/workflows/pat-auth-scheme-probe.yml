# Diagnostic workflow: probe GitHub's git smart-HTTP backend with various
# Authorization schemes using AUTO_RELEASE_PAT. Manual-trigger only.
#
# Use case: when investigating PAT auth-scheme behavior (e.g. "does Bearer
# work for git push?"), trigger this and read the per-scheme HTTP status
# from the workflow log. The PAT value never leaves the runner — only
# status codes are emitted.
#
# Endpoint: /info/refs?service=git-receive-pack — same auth-gated path
# git push uses, but a GET request that makes no state changes.

name: PAT auth-scheme diagnostic

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    env:
      AUTO_RELEASE_PAT: ${{ secrets.AUTO_RELEASE_PAT }}
    steps:
      - name: Probe four Authorization schemes against git-receive-pack info-refs
        run: |
          set -u
          URL='https://github.com/charleshall888/cortex-command.git/info/refs?service=git-receive-pack'

          probe() {
            local label="$1"
            local header="$2"
            echo "=== $label ==="
            # -i prints response headers; we grep for status line and
            # WWW-Authenticate (the server's authoritative declaration
            # of which schemes it accepts).
            curl -sS -i -o /tmp/resp.txt -H "$header" "$URL" || true
            head -1 /tmp/resp.txt
            grep -i '^WWW-Authenticate:' /tmp/resp.txt || echo "  (no WWW-Authenticate header)"
            echo ""
          }

          probe "1. Bearer (capital B)" "Authorization: Bearer $AUTO_RELEASE_PAT"
          probe "2. bearer (lowercase)" "Authorization: bearer $AUTO_RELEASE_PAT"
          probe "3. token (legacy GitHub scheme)" "Authorization: token $AUTO_RELEASE_PAT"

          B64=$(printf '%s' "x-access-token:$AUTO_RELEASE_PAT" | base64 | tr -d '\n')
          probe "4. Basic with x-access-token (control)" "Authorization: Basic $B64"

          # Also probe with NO auth header — the WWW-Authenticate from
          # this anonymous request is GitHub's unprompted declaration of
          # what schemes it advertises.
          echo "=== 5. No Authorization header (anonymous — see WWW-Authenticate) ==="
          curl -sS -i -o /tmp/resp.txt "$URL" || true
          head -1 /tmp/resp.txt
          grep -i '^WWW-Authenticate:' /tmp/resp.txt || echo "  (no WWW-Authenticate header)"
