name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml pytest

      # Every blocking step below carries `if: ${{ !cancelled() }}` so one red
      # step cannot mask the rest: GitHub Actions otherwise aborts the job at
      # the first failing step and marks every later step `skipped` — which is
      # how four blocking steps went unexecuted for days behind one red test
      # (#386). The job still fails when any step fails.
      - name: Validate plugin skills
        if: ${{ !cancelled() }}
        run: |
          for skills_dir in plugins/*/skills; do
            python3 scripts/validate-skill.py "$skills_dir"
          done

      - name: Call-graph guard — no programmatic callee may carry disable-model-invocation
        if: ${{ !cancelled() }}
        run: |
          python3 scripts/validate-callgraph.py \
            plugins/cortex-pr-review/skills \
            plugins/cortex-ui-extras/skills \
            plugins/cortex-dev-extras/skills \
            plugins/cortex-core/skills \
            plugins/cortex-overnight/skills \
            plugins/android-dev-extras/skills

      - name: Contract checker tests (blocking)
        if: ${{ !cancelled() }}
        run: pytest tests/test_check_contract.py

      - name: Kept-pauses parity tests (blocking)
        if: ${{ !cancelled() }}
        run: pytest tests/test_lifecycle_kept_pauses_parity.py

      - name: Lifecycle reference resolve tests (blocking)
        if: ${{ !cancelled() }}
        run: pytest tests/test_lifecycle_references_resolve.py

      - name: Lifecycle event roundtrip tests (blocking)
        if: ${{ !cancelled() }}
        run: pytest tests/test_lifecycle_event_roundtrip.py

      - name: CLI pin target-set tests (blocking)
        if: ${{ !cancelled() }}
        run: pytest tests/test_cli_pin_target_set.py

      - name: Lifecycle config parity tests (blocking)
        if: ${{ !cancelled() }}
        run: pytest tests/test_lifecycle_config_parity.py

      - name: Lifecycle config dormant-template tests (blocking)
        if: ${{ !cancelled() }}
        run: pytest tests/test_lifecycle_config_dormant_template.py

      - name: Dashboard route smoke test (fresh resolve, Starlette floored at >=1.0)
        if: ${{ !cancelled() }}
        run: |
          # Constraints-free fresh install: no -c/constraints file, so the
          # web stack re-resolves from PyPI against pyproject's new bounds
          # (which lands Starlette >=1.0). This is what makes the gate
          # discriminating — the route test must exercise the real
          # TemplateResponse render path on a >=1.0 resolve, where the
          # pre-rewrite name-first form 500s.
          pip install . httpx packaging
          # Assert the freshly-resolved Starlette is >=1.0. The <2.0 cap
          # permits but does not require >=1.0, so fail loudly if the
          # resolve ever lands <1.0 (a non-discriminating run).
          python -c "import starlette; from packaging.version import Version; assert Version(starlette.__version__) >= Version('1.0'), starlette.__version__"
          pytest cortex_command/dashboard/tests/test_routes_smoke.py

      - name: Contract audit signal (non-blocking)
        continue-on-error: true
        run: |
          set +e
          audit_output=$(CORTEX_COMMAND_FORCE_SOURCE=1 bin/cortex-check-contract --audit 2>&1)
          rc=$?
          {
            echo "### Contract audit (non-blocking signal)"
            echo ""
            echo '```'
            echo "$audit_output"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit $rc
