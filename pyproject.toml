[project]
name = "cortex-command"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "claude-agent-sdk",
    "fastapi",
    "uvicorn[standard]",
    "jinja2",
    "markdown",
]

[tool.pytest.ini_options]
testpaths = ["tests", "cortex_command/dashboard/tests", "cortex_command/pipeline/tests", "cortex_command/overnight/tests"]
pythonpath = ["."]
markers = [
    "slow: opt-in tests that invoke live models (use --run-slow to enable)",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
]
