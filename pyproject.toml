[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "cortex-command"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "claude-agent-sdk>=0.1.46,<0.1.47",
    "fastapi",
    "uvicorn[standard]",
    "jinja2",
    "markdown",
    "psutil>=5.9",
    "mcp>=1.27.0",
    "tiktoken>=0.7.0,<1.0",
]

[project.scripts]
cortex = "cortex_command.cli:main"
cortex-batch-runner = "cortex_command.overnight.batch_runner:main"
cortex-update-item = "cortex_command.backlog.update_item:main"
cortex-create-backlog-item = "cortex_command.backlog.create_item:main"
cortex-generate-backlog-index = "cortex_command.backlog.generate_index:main"
cortex-build-epic-map = "cortex_command.backlog.build_epic_map:main"

[tool.hatch.build.targets.wheel]
packages = ["cortex_command"]

# Ensure the bash launcher template (rendered by
# MacOSLaunchAgentBackend._install_launcher_script at schedule time) is
# shipped inside the wheel as package data. Hatchling already includes
# everything under the package tree by default; the explicit entry here
# documents the dependency and guards against future build-config
# pruning.
[tool.hatch.build.targets.wheel.force-include]
"cortex_command/overnight/scheduler/launcher.sh" = "cortex_command/overnight/scheduler/launcher.sh"

[tool.pytest.ini_options]
testpaths = ["tests", "cortex_command/dashboard/tests", "cortex_command/pipeline/tests", "cortex_command/overnight/tests", "cortex_command/init/tests", "cortex_command/backlog/tests", "cortex_command/tests"]
pythonpath = ["."]
markers = [
    "slow: opt-in tests that invoke live models (use --run-slow to enable)",
    "serial: tests that spawn real subprocesses and must not run in parallel against each other (R26 / Task 20)",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-repeat>=0.9.3",
]
