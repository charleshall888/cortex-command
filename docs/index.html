  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

#8093bd;\n    --ink-70: #1f3470;\n    --ink-faint: #6b80b0;\n    --paper: #d9e3f3;\n    --rule: #1e3370;\n    --rule-soft: #8ea4ce;\n    --blue: #0a2472;\n    --blue-soft: #2954b0;\n    --blue-faint: #aec0e3;\n    --ochre: #b04a1f;\n    --ochre-soft: #d77a4a;\n    /* blueprint-specific tints */\n    --grid-tint: rgba(10, 36, 114, 0.07);\n    --grid-tint-soft: rgba(10, 36, 114, 0.05);\n    --grid-tint-strong: rgba(10, 36, 114, 0.12);\n    --shadow-tint: rgba(10, 24, 56, 0.06);\n    --shadow-tint-deep: rgba(10, 24, 56, 0.3);\n    --shadow-blue: rgba(10, 36, 114, 0.45);\n    --shadow-blue-soft: rgba(10, 36, 114, 0.18);\n    --shadow-ochre: rgba(176, 74, 31, 0.22);\n    --grain-opacity: 0.9;\n  }\n  /* ─── STAIN: Carbon ─── */\n  html[data-stain=\"carbon\"] {\n    --parchment: #15151a;\n    --parchment-2: #1d1d23;\n    --parchment-3: #292930;\n    --ink: #ece6d3;\n    --ink-2: #d8d2bf;\n    --ink-mute: #a8a392;\n    --ink-50: #908b7a;\n    --ink-30: #62604f;\n    --ink-70: #c0baa6;\n    --ink-faint: #76705f;\n    --paper: #15151a;\n    --rule: #ece6d3;\n    --rule-soft: #44434c;\n    --blue: #8aa6e3;\n    --blue-soft: #a3bbe9;\n    --blue-faint: #4a567f;\n    --ochre: #f0b870;\n    --ochre-soft: #f5cb95;\n    /* carbon-specific tints — light grids on dark paper */\n    --grid-tint: rgba(236, 230, 211, 0.045);\n    --grid-tint-soft: rgba(236, 230, 211, 0.03);\n    --grid-tint-strong: rgba(236, 230, 211, 0.09);\n    --shadow-tint: rgba(0, 0, 0, 0.4);\n    --shadow-tint-deep: rgba(0, 0, 0, 0.55);\n    --shadow-blue: rgba(138, 166, 227, 0.18);\n    --shadow-blue-soft: rgba(138, 166, 227, 0.14);\n    --shadow-ochre: rgba(240, 184, 112, 0.22);\n    --grain-opacity: 1.6;\n    --halo-glow: rgba(240, 184, 112, 0.06);\n  }\n\n  /* ─── MANUSCRIPT: Engineering doc (mono everything) ─── */\n  html[data-manuscript=\"engdoc\"] {\n    --serif: \"JetBrains Mono\", ui-monospace, Menlo, monospace;\n    --ui: \"JetBrains Mono\", ui-monospace, Menlo, monospace;\n  }\n  html[data-manuscript=\"engdoc\"] body { font-size: 15px; line-height: 1.6; letter-spacing: -0.005em; }\n  html[data-manuscript=\"engdoc\"] .hero h1,\n  html[data-manuscript=\"engdoc\"] .install h2,\n  html[data-manuscript=\"engdoc\"] .pipe-title,\n  html[data-manuscript=\"engdoc\"] .pg-title,\n  html[data-manuscript=\"engdoc\"] .sec h3,\n  html[data-manuscript=\"engdoc\"] .spec-card h3,\n  html[data-manuscript=\"engdoc\"] .manifesto p,\n  html[data-manuscript=\"engdoc\"] .toast .body .title {\n    font-weight: 500; letter-spacing: -0.02em;\n  }\n  html[data-manuscript=\"engdoc\"] em,\n  html[data-manuscript=\"engdoc\"] .pipe-title em,\n  html[data-manuscript=\"engdoc\"] .pg-title em {\n    font-style: normal; text-decoration: underline; text-decoration-color: var(--ochre); text-underline-offset: 4px;\n  }\n\n  /* ─── MANUSCRIPT: Marketing site (sans serif headlines, looser) ─── */\n  html[data-manuscript=\"marketing\"] {\n    --serif: \"Inter\", system-ui, -apple-system, sans-serif;\n  }\n  html[data-manuscript=\"marketing\"] body { letter-spacing: -0.005em; }\n  html[data-manuscript=\"marketing\"] .hero h1,\n  html[data-manuscript=\"marketing\"] .install h2,\n  html[data-manuscript=\"marketing\"] .pipe-title,\n  html[data-manuscript=\"marketing\"] .pg-title,\n  html[data-manuscript=\"marketing\"] .sec h3,\n  html[data-manuscript=\"marketing\"] .spec-card h3 {\n    font-weight: 600; letter-spacing: -0.035em; line-height: 1.05;\n  }\n  html[data-manuscript=\"marketing\"] .hero h1 em,\n  html[data-manuscript=\"marketing\"] .pipe-title em,\n  html[data-manuscript=\"marketing\"] .pg-title em {\n    font-style: normal; background: linear-gradient(180deg, transparent 60%, var(--ochre-soft) 60%);\n    padding: 0 2px;\n  }\n  html[data-manuscript=\"marketing\"] .manifesto p,\n  html[data-manuscript=\"marketing\"] .daytime .copy p,\n  html[data-manuscript=\"marketing\"] .sec .body { font-weight: 400; }\n\n  *,\n  *::before,\n  *::after {\n    box-sizing: border-box;\n  }\n\n  html,\n  body {\n    margin: 0;\n    padding: 0;\n    background: var(--parchment);\n    color: var(--ink);\n    font-family: var(--serif);\n    font-size: 17px;\n    line-height: 1.55;\n    -webkit-font-smoothing: antialiased;\n  }\n\n  /* Subtle paper grain on warm sections */\n  body::before {\n    content: \"\";\n    position: fixed;\n    inset: 0;\n    pointer-events: none;\n    z-index: 1;\n    background-image:\n      radial-gradient(var(--shadow-tint) 1px, transparent 1px),\n      radial-gradient(rgba(194, 102, 10, 0.02) 1px, transparent 1px);\n    background-size: 3px 3px, 7px 7px;\n    background-position: 0 0, 1px 1px;\n    mix-blend-mode: multiply;\n  }\n\n  .page {\n    position: relative;\n    z-index: 2;\n    max-width: 1280px;\n    margin: 0 auto;\n    padding: 36px 320px 96px 80px; /* sidebar gutter on right */\n  }\n\n  @media (max-width: 1100px) {\n    .page { padding: 28px 32px 72px 32px; }\n  }\n\n  /* ───────────── Sidebar ───────────── */\n  .sidebar {\n    position: fixed;\n    top: 28px;\n    right: 28px;\n    width: 280px;\n    z-index: 10;\n    padding: 18px 18px 16px 22px;\n    background: var(--parchment);\n    border-left: 1px solid var(--blue);\n    font-family: var(--ui);\n    font-size: 12.5px;\n    color: var(--ink-2);\n  }\n  .sidebar::before {\n    content: \"\";\n    position: absolute;\n    inset: 0 0 0 0;\n    border: 1px solid var(--shadow-tint-deep);\n    border-left: none;\n    pointer-events: none;\n  }\n  .sidebar h3 {\n    margin: 0 0 6px 0;\n    font-family: var(--serif);\n    font-weight: 500;\n    font-size: 16px;\n    letter-spacing: -0.005em;\n    color: var(--ink);\n  }\n  .sidebar .vp {\n    margin: 0 0 10px 0;\n    color: var(--ink-mute);\n    font-size: 13px;\n    line-height: 1.4;\n  }\n  .sidebar .status {\n    font-family: var(--mono);\n    font-size: 10.5px;\n    color: var(--ink-faint);\n    letter-spacing: 0.01em;\n    margin-bottom: 14px;\n    word-break: break-all;\n  }\n  .sidebar .cta {\n    display: inline-block;\n    padding: 6px 0;\n    font-family: var(--mono);\n    font-size: 12px;\n    color: var(--ink);\n    text-decoration: none;\n    border-bottom: 1px solid var(--ink);\n  }\n  .sidebar .cta:hover { color: var(--ochre); border-color: var(--ochre); }\n\n  /* ─── Meta-spec sidebar (this page, as a spec) ─── */\n  .meta-spec {\n    margin-top: 18px;\n    padding-top: 14px;\n    border-top: 1px dashed var(--rule-soft);\n  }\n  .ms-head {\n    display: flex; align-items: baseline; justify-content: space-between;\n    font-family: var(--mono); font-size: 10.5px;\n    color: var(--ink); margin-bottom: 8px;\n  }\n  .ms-file {\n    border-bottom: 1px solid var(--blue);\n    padding-bottom: 1px; color: var(--blue);\n  }\n  .ms-rev {\n    font-size: 9.5px; color: var(--ink-faint); letter-spacing: 0.1em;\n  }\n  .ms-fm {\n    background: var(--parchment-2);\n    border: 1px solid var(--rule-soft);\n    padding: 7px 9px;\n    margin-bottom: 12px;\n    font-family: var(--mono); font-size: 10px;\n    line-height: 1.55;\n  }\n  .ms-row { display: flex; gap: 6px; align-items: baseline; }\n  .ms-row .ms-k { color: var(--ink-faint); width: 78px; flex-shrink: 0; }\n  .ms-row .ms-v { color: var(--ink); flex: 1; min-width: 0; word-break: break-all; }\n  .ms-gates-label {\n    font-family: var(--mono); font-size: 9.5px;\n    text-transform: uppercase; letter-spacing: 0.14em;\n    color: var(--ink-faint); margin-bottom: 8px;\n  }\n  .ms-gates {\n    list-style: none; margin: 0 0 12px 0; padding: 0;\n    display: flex; flex-direction: column; gap: 2px;\n  }\n  .ms-gates li {\n    display: grid;\n    grid-template-columns: 16px auto 1fr;\n    align-items: baseline;\n    gap: 6px;\n    padding: 5px 0;\n    border-bottom: 1px dotted var(--rule-soft);\n    transition: color 0.5s ease;\n  }\n  .ms-gates li:last-child { border-bottom: none; }\n  .ms-tick {\n    width: 10px; height: 10px;\n    border: 1px solid var(--ink-faint);\n    border-radius: 1px;\n    position: relative;\n    transition: background 0.5s ease, border-color 0.5s ease;\n    align-self: center;\n  }\n  .ms-name {\n    font-family: var(--mono); font-size: 11px;\n    color: var(--ink-mute);\n    transition: color 0.5s ease;\n  }\n  .ms-desc {\n    font-family: var(--serif); font-size: 11.5px; font-style: italic;\n    color: var(--ink-faint); line-height: 1.35;\n    grid-column: 2 / 4;\n    margin-top: 1px;\n  }\n  /* in-progress (currently being read) */\n  .ms-gates li.active .ms-tick {\n    background: transparent; border-color: var(--blue);\n    box-shadow: 0 0 0 2px var(--shadow-blue-soft);\n  }\n  .ms-gates li.active .ms-name { color: var(--blue); }\n  .ms-gates li.active::after {\n    content: \"\"; width: 5px; height: 5px;\n    background: var(--blue); border-radius: 50%;\n    align-self: center;\n    animation: ms-pulse 1.4s ease-in-out infinite;\n  }\n  @keyframes ms-pulse { 0%,100% { opacity: 0.35; } 50% { opacity: 1; } }\n  /* cleared */\n  .ms-gates li.cleared .ms-tick {\n    background: var(--blue); border-color: var(--blue);\n  }\n  .ms-gates li.cleared .ms-tick::after {\n    content: \"\"; position: absolute;\n    left: 2px; top: 0px;\n    width: 4px; height: 7px;\n    border: solid var(--parchment);\n    border-width: 0 1.5px 1.5px 0;\n    transform: rotate(40deg);\n  }\n  .ms-gates li.cleared .ms-name { color: var(--ink); }\n  .ms-gates li.cleared .ms-desc { color: var(--ink-mute); font-style: normal; }\n\n  .ms-progress {\n    height: 2px; background: var(--rule-soft);\n    position: relative; margin-bottom: 6px;\n  }\n  .ms-progress-fill {\n    position: absolute; left: 0; top: 0; bottom: 0;\n    background: var(--blue);\n    width: 0%;\n    transition: width 0.5s cubic-bezier(0.2, 0.7, 0.2, 1);\n  }\n  .ms-status {\n    font-family: var(--mono); font-size: 9.5px;\n    color: var(--ink-faint);\n    letter-spacing: 0.06em;\n  }\n  .ms-status.shipped { color: var(--ochre); }\n\n  @media (max-width: 1100px) {\n    .meta-spec { display: none; }\n  }\n\n  @media (max-width: 1280px) {\ }\n  .ex-fig svg {\n    display: block; width: 100%; height: auto;\n    margin-top: 8px;\n    overflow: visible;\n  }\n  /* shared schematic stroke styles */\n  .ex-fig .schem-line { fill: none; stroke: var(--ink-50); stroke-width: 1; }\n  .ex-fig .schem-line.dashed { stroke-dasharray: 3 2.5; }\n  .ex-fig .schem-line.solid-blue { stroke: var(--blue); stroke-width: 1.25; }\n  .ex-fig .schem-rect {\n    fill: var(--paper); stroke: var(--ink-50); stroke-width: 1;\n  }\n  .ex-fig .schem-rect.tight {\n    stroke: var(--blue); stroke-width: 1.25;\n  }\n  .ex-fig .schem-dot { fill: var(--ink); }\n  .ex-fig .schem-dot.blue { fill: var(--blue); }\n  .ex-fig .schem-tag {\n    font-family: \"JetBrains Mono\", ui-monospace, Menlo, monospace;\n    font-size: 7.5px;\n    letter-spacing: 0.1em;\n    fill: var(--ink-mute);\n    text-transform: lowercase;\n  }\n  .ex-fig .schem-tag.dim { fill: var(--ink-faint); }\n  .ex-fig .schem-tag.blue { fill: var(--blue); }\n  .ex-fig .schem-cap {\n    font-family: \"JetBrains Mono\", ui-monospace, Menlo, monospace;\n    font-size: 7px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    fill: var(--ink-faint);\n  }\n  /* schematic for /refine — rolling lozenge for \"tightening\" gauge */\n  .ex-fig .schem-gauge-track {\n    fill: none; stroke: var(--rule-soft); stroke-width: 4; stroke-linecap: round;\n  }\n  .ex-fig .schem-gauge-fill {\n    fill: none; stroke: var(--blue); stroke-width: 4; stroke-linecap: round;\n  }\n\n  .example-label {\n    font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em;\n    color: var(--ink-faint); margin: 12px 0 6px 0;\n    font-style: italic;\n  }\n\n  /* The empty spec frontmatter card visible in viewport */\n  .spec-card {\n    position: relative;\n    margin-top: 24px;\n    background: var(--parchment-2);\n    border: 1px solid var(--rule-soft);\n    padding: 26px 32px 30px 56px;\n    box-shadow: 0 1px 0 var(--shadow-tint), 0 12px 32px -24px var(--shadow-tint-deep);\n  }\n  .spec-card r: var(--ochre);\n    font-family: var(--mono);\n    font-size: 9.5px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    transform: rotate(-1.2deg);\n  }\n  .manifesto p {\n    font-family: var(--serif);\n    font-size: clamp(22px, 2.4vw, 30px);\n    line-height: 1.35;\n    font-weight: 350;\n    letter-spacing: -0.012em;\n    color: var(--ink);\n    margin: 0;\n    text-wrap: pretty;\n  }\n  .manifesto p em {\n    font-style: italic;\n    color: var(--ochre);\n  }\n\n  /* ───────────── Daytime terminal section ───────────── */\n  .daytime {\n    padding: 56px 0 40px;\n    border-top: 1px solid var(--rule-soft);\n    border-bottom: 1px solid var(--rule-soft);\n    display: grid;\n    grid-template-columns: 1fr 1.2fr;\n    gap: 48px;\n    align-items: start;\n  }\n  @media (max-width: 900px) {\n    .daytime { grid-template-columns: 1fr; gap: 28px; }\n  }\n  .daytime .copy .marker {\n    font-family: var(--mono);\n    font-size: 10.5px;\n    color: var(--ink-faint);\n    text-transform: uppercase;\n    letter-spacing: 0.12em;\n    margin-bottom: 14px;\n  }\n  .daytime .copy p {\n    font-family: var(--serif);\n    font-size: 22px;\n    line-height: 1.45;\n    font-weight: 350;\n    color: var(--ink);\n    margin: 0;\n    letter-spacing: -0.008em;\n    text-wrap: pretty;\n  }\n  .daytime .copy p code {\n    font-family: var(--mono);\n    font-size: 0.78em;\n    color: var(--blue);\n    background: var(--grid-tint-strong);\n    padding: 1px 5px;\n    border-radius: 2px;\n  }\n\n  .term {\n    background: var(--parchment-2);\n    border: 1px solid var(--rule-soft);\n    box-shadow: 0 14px 40px -28px var(--shadow-tint-deep);\n    font-family: var(--mono);\n    font-size: 12.5px;\n    color: var(--ink-2);\n  }\n  .term .bar {\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    padding: 8px 12px;\n    border-bottom: 1px solid var(--rule-soft);\n    background: var(--parchment-3);\n    font-family: var(--mono);\n    font-size: 11px;\n    color: var(--ink-mute);\n  }\n  .term .bar .lights { display: flex; gap: 5px; }\n  .term .bar .lights span {\n    width: 9px; height: 9px; border-radius: 50%;\n    background: transparent;\n    border: 1px solid var(--ink-faint);\n  }\n  .term .bar .title { flex: 1; text-align: center; opacity: 0.8; }\n  .term .body { padding: 16px 18px 20px; line-height: 1.65; }\n  .term .body .prompt { color: var(--ink-faint); }\n  .term .body .cmd { color: var(--ink); }\n  .term .body .phase {\n    color: var(--blue);\n    border-left: 2px solid var(--blue);\n    padding-left: 8px;\n    margin: 10px 0 6px;\n    display: inline-block;\n  }\n  .term .body .dim { color: var(--ink-faint); }\n  .term .body .dec { color: var(--ochre); }\n  .term .body .cur::after {\n    content: \"▌\";\n    margin-left: 4px;\n    color: var(--ink);\n    animation: blink 1.1s steps(2, start) infinite;\n  }\n  @keyframes blink { to { visibility: hidden; } }\n\n  /* ───────────── Spec sections (locking) ───────────── */\n  .spec-stream {\n    padding: 80px 0 24px;\n  }\n  .spec-stream .stream-header {\n    font-family: var(--mono);\n    font-size: 10.5px;\n    color: var(--ink-faint);\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    margin-bottom: 24px;\n    display: flex;\n    justify-content: space-between;\n    border-bottom: 1px dashed var(--rule-soft);\n    padding-bottom: 8px;\n  }\n\n  .sec {\n    position: relative;\n    margin-bottom: 64px;\n    padding: 34px 36px 38px 90px;\n    background: var(--parchment-2);\n    border: 1px solid var(--rule-soft);\n    transition: background 0.6s ease, border-color 0.6s ease, box-shadow 0.6s ease;\n    overflow: visible;\n  }\n\n  /* engineering grid behind sections */\n  .sec::before {\n    content: \"\";\n    position: absolute;\n    inset: 0;\n    background-image:\n      linear-gradient(to right, var(--grid-tint-soft) 1px, transparent 1px),\n      linear-gradient(to bottom, var(--grid-tint-soft) 1px, transparent 1px);\n    background-size: 14px 14px;\n    pointer-events: none;\n    opacity: 0.7;\n    transition: opacity 0.6s ease;\n  }\n\n  /* margin column */\n  .sec .margin {\n    position: absolute;\n    left: 0;\n    top: 0;\n    bottom: 0;\n    width: 70px;\n    border-right: 1px solid var(--rule-soft);\n  }\n  .sec .margin .num {\n    position: absolute;\n    top: 30px;\n    left: 0;\n    right: 12px;\n    text-align: right;\n    font-family: var(--mono);\n    font-size: 10.5px;\n    color: var(--ink-faint);\n  }\n  .sec .margin .ticks {\n    position: absolute;\n    top: 60px;\n    left: 0;\n    right: 12px;\n    text-align: right;\n    font-family: var(--mono);\n    font-size: 9.5px;\n    letter-spacing: 0.08em;\n    color: var(--ink-faint);\n    line-height: 1.5;\n  }\n  .sec .margin .ticks .gate-count {\n    color: var(--blue);\n    letter-spacing: 0.04em;\n    font-size: 13px;\n    line-height: 1;\n    display: block;\n    margin-bottom: 2px;\n  }\n  .sec .margin .ticks .gate-label {\n    text-transform: uppercase;\n    letter-spacing: 0.18em;\n    font-size: 8.5px;\n    display: block;\n  }\n\n  .sec .leader {\n    /* dotted leader from margin into body */\n    position: absolute;\n    top: 38px;\n    left: 70px;\n    right: 36px;\n    border-bottom: 1px dotted var(--rule-soft);\n    opacity: 0.6;\n  }\n\n  .sec h3 {\n    position: relative;\n    margin: 0 0 4px 0;\n    font-family: var(--serif);\n    font-weight: 400;\n    font-size: 30px;\n    letter-spacing: -0.012em;\n    color: var(--ink);\n    display: flex;\n    align-items: baseline;\n    gap: 18px;\n  }\n  .sec h3 .phase-tag {\n    font-family: var(--mono);\n    font-size: 10.5px;\n    text-transform: uppercase;\n    letter-spacing: 0.14em;\n    color: var(--ink-faint);\n    font-weight: 400;\n    transition: color 0.6s ease;\n  }\n  .sec .status-line {\n    position: relative;\n    font-family: var(--mono);\n    font-size: 11px;\n    color: var(--ink-faint);\n    margin-bottom: 22px;\n    letter-spacing: 0.04em;\n  }\n\n  .sec .body {\n    position: relative;\n    font-family: var(--serif);\n    font-size: 19px;\n    line-height: 1.55;\n    color: var(--ink);\n    font-weight: 350;\n    max-width: 60ch;\n    text-wrap: pretty;\n  }\n  .sec .body .placeholder {\n    color: var(--ink-faint);\n    font-style: italic;\n    font-family: var(--mono);\n    font-size: 13px;\n    letter-spacing: 0.02em;\n  }\n  .sec .body ul {\n    margin: 6px 0 0 0;\n    padding: 0;\n    list-style: none;\n  }\n  .sec .body ul li {\n    position: relative;\n    padding-left: 20px;\n    margin-bottom: 6px;\n  }\n  .sec .body ul li::before {\n    content: \"—\";\n    position: absolute;\n    left: 0;\n    color: var(--blue);\n    opacity: 0.7;\n  }\n  .sec .body ul li strong {\n    font-style: italic;\n    font-weight: 400;\n    color: var(--ink-2);\n  }\n\n  /* Stamps */\n  .sec .stamp {\n    position: absolute;\n    top: 22px;\n    right: 28px;\n    padding: 3px 9px;\n    border: 1.2px solid var(--blue);\n    color: var(--blue);\n    font-family: var(--mono);\n    font-size: 9.5px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    transform: rotate(-2deg);\n    opacity: 0;\n    transition: opacity 0.5s ease 0.4s;\n  }\n  .sec .rev {\n    position: absolute;\n    top: 22px;\n    right: 200px;\n    font-family: var(--mono);\n    font-size: 9.5px;\n    color: var(--ink-faint);\n    letter-spacing: 0.12em;\n  }\n\n  /* Locking states */\n  .sec.locking {\n    box-shadow: inset 0 0 0 1px var(--shadow-blue);\n  }\n  .sec.locking::before { opacity: 1; }\n  .sec.locked {\n    background: var(--parchment);\n    border-color: var(--blue-faint);\n    box-shadow:\n      inset 3px 0 0 0 var(--blue),\n      0 1px 0 var(--shadow-tint),\n      0 18px 40px -32px var(--shadow-blue);\n  }\n  .sec.locked::before { opacity: 0.55; }\n  .sec.locked .stamp { opacity: 1; }\n  .sec.locked h3 .phase-tag { color: var(--blue); }\n  .sec.locked .status-line .ok { color: var(--blue); }\n\n  /* placeholder shimmer when not yet locked */\n  .sec .body .placeholder {\n    position: relative;\n  }\n  .sec.locked .body .placeholder { display: none; }\n  .sec:not(.locked) .body .real { display: none; }\n\n  /* Margin gloss footnote */\n  .gloss {\n    display: inline-block;\n    margin-left: 4px;\n    font-family: var(--mono);\n    font-style: italic;\n    font-size: 10.5px;\n    color: var(--ochre);\n    border-bottom: 1px solid var(--ochre);\n    padding-bottom: 1px;\n    cursor: help;\n    vertical-align: 1px;\n    letter-spacing: 0.01em;\n  }\n  .gloss::before { content: \"*\"; margin-right: 2px; }\n\n  /* ───────────── Achievement toast ───────────── */\n  .toast {\n    position: fixed;\n    bottom: 28px;\n    left: 50%;\n    transform: translate(-50%, 80px);\n    z-index: 50;\n    display: flex;\n    align-items: stretch;\n    gap: 0;\n    background: var(--parchment);\n    border: 1px solid var(--blue);\n    box-shadow: 0 24px 56px -24px var(--shadow-blue);\n    min-width: 360px;\n    max-width: 420px;\n    opacity: 0;\n    transition: transform 0.6s cubic-bezier(0.2, 0.7, 0.2, 1), opacity 0.4s ease;\n    font-family: var(--ui);\n  }\n  .toast.show { transform: translate(-50%, 0); opacity: 1; }\n  .toast .icon {\n    width: 60px;\n    background: var(--blue);\n    color: var(--parchment);\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    flex-shrink: 0;\n  }\n  .toast .icon svg { width: 28px; height: 28px; }\n  .toast .body {\n    padding: 12px 16px 14px;\n  }\n  .toast .body .top {\n    font-family: var(--mono);\n    font-size: 9.5px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--blue);\n    margin-bottom: 4px;\n  }\n  .toast .body .title {\n    font-family: var(--serif);\n    font-size: 19px;\n    font-weight: 500;\n    letter-spacing: -0.005em;\n    color: var(--ink);\n    margin-bottom: 2px;\n  }\n  .toast .body .sub {\n    font-size: 12px;\n    color: var(--ink-mute);\n    text-transform: lowercase;\n  }\n\n  /* ───────────── Trust grid (§05) ─────────────\n     Card grid that lives between the pipeline diagram and the install\n     section. Each card is a self-contained mini-figure (FIG 3..9) showing\n     ONE behavior of the harness. Vocabulary intentionally rhymes with\n     the .ex-fig figures up in the hero so the page reads as one document. */\n  .trust-grid {\n    padding: 96px 0 64px;\n    border-top: 1px solid var(--rule-soft);\n    margin-top: 24px;\n    position: relative;\n  }\n  .trust-grid .marker {\n    font-family: var(--mono);\n    font-size: 10.5px;\n    color: var(--ink-faint);\n    text-transform: uppercase;\n    letter-spacing: 0.12em;\n    margin-bottom: 14px;\n  }\n  .trust-grid h2 {\n    font-family: var(--serif);\n    font-weight: 400;\n    font-size: clamp(36px, 4vw, 56px);\n    letter-spacing: -0.02em;\n    margin: 0 0 14px 0;\n    line-height: 1.05;\n    max-width: 920px;\n  }\n  .trust-grid h2 em { font-style: italic; color: var(--ochre); }\n  .trust-grid .tg-lede {\n    font-family: var(--serif);\n    font-size: clamp(15px, 1.2vw, 17px);\n    line-height: 1.55;\n    color: var(--ink-mute);\n    max-width: 720px;\n    margin: 0 0 36px 0;\n  }\n  .trust-grid .tg-cards {\n    display: grid;\n    grid-template-columns: repeat(2, minmax(0, 1fr));\n    gap: 20px;\n    max-width: 980px;\n  }\n  @media (max-width: 720px) {\n    .trust-grid .tg-cards { grid-template-columns: 1fr; }\n  }\n\n  .tg-card {\n    position: relative;\n    border: 1px solid var(--rule-soft);\n    background: var(--paper);\n    padding: 30px 14px 16px 14px;\n    display: flex;\n    flex-direction: column;\n    gap: 10px;\n    min-height: 246px;\n  }\n  /* mono plate-number caption in upper-left, like .ex-fig::before */\n  .tg-card::before {\n    content: attr(data-fig);\n    position: absolute;\n    top: 8px; left: 12px;\n    font-family: var(--mono);\n    font-size: 8.5px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--ink-faint);\n  }\n  .tg-card .tg-frame {\n    margin-top: 14px;\n    border: 1px dashed var(--rule-soft);\n    background: transparent;\n    padding: 6px;\n    border-radius: 2px;\n    overflow: hidden;\n  }\n  .tg-card .tg-frame svg {\n    display: block; width: 100%; height: auto;\n  }\n  .tg-card h4 {\n    font-family: var(--serif);\n    font-weight: 500;\n    font-style: italic;\n    font-size: clamp(17px, 1.45vw, 20px);\n    line-height: 1.15;\n    margin: 2px 0 0 0;\n    color: var(--ink);\n    letter-spacing: -0.01em;\n  }\n  .tg-card .tg-cap {\n    font-family: var(--mono);\n    font-size: 10.5px;\n    color: var(--ink-mute);\n    line-height: 1.45;\n    margin-top: auto;\n  }\n  .tg-card .tg-body {\n    font-family: var(--serif);\n    font-size: 14px;\n    line-height: 1.5;\n    color: var(--ink-mute);\n    margin: 6px 0 4px 0;\n  }\n  .tg-card .tg-body code {\n    font-family: var(--mono);\n    font-size: 11.5px;\n    color: var(--ink);\n    background: color-mix(in srgb, var(--blue) 8%, var(--paper));\n    padding: 0 3px;\n    border-radius: 2px;\n  }\n  .tg-card.candid .tg-body em { color: var(--ochre); font-style: italic; }\n  /* the seventh card breaks the marketing voice on purpose */\n  .tg-card.candid {\n    background: linear-gradient(180deg, var(--paper) 0%, var(--paper) 70%, color-mix(in srgb, var(--ochre) 8%, var(--paper)) 100%);\n  }\n  .tg-card.candid::before { color: var(--ochre); }\n  .tg-card.candid h4 { color: var(--ochre); }\n\n  /* ── Schematic strokes (echoing .ex-fig) ── */\n  .tg-card svg .schem-line { fill: none; stroke: var(--ink-50); stroke-width: 1; }\n  .tg-card svg .schem-line.dashed { stroke-dasharray: 3 2.5; }\n  .tg-card svg .schem-line.solid-blue { stroke: var(--blue); stroke-width: 1.25; }\n  .tg-card svg .schem-line.ochre { stroke: var(--ochre); stroke-width: 1.25; }\n  .tg-card svg .schem-rect { fill: var(--paper); stroke: var(--ink-50); stroke-width: 1; }\n  .tg-card svg .schem-rect.tight { stroke: var(--blue); stroke-width: 1.25; }\n  .tg-card svg .schem-rect.alarm { stroke: var(--ochre); stroke-width: 1.25; }\n  .tg-card svg .schem-dot { fill: var(--ink); }\n  .tg-card svg .schem-dot.blue { fill: var(--blue); }\n  .tg-card svg .schem-dot.ochre { fill: var(--ochre); }\n  .tg-card svg .schem-dot.faint { fill: var(--ink-30); }\n  .tg-card svg .schem-tag {\n    font-family: var(--mono);\n    font-size: 7.5px;\n    letter-spacing: 0.12em;\n    text-transform: lowercase;\n    fill: var(--ink-50);\n  }\n  .tg-card svg .schem-tag.blue { fill: var(--blue); }\n  .tg-card svg .schem-tag.ochre { fill: var(--ochre); }\n  .tg-card svg .schem-tag.dim { fill: var(--ink-faint); }\n  .tg-card svg .schem-cap {\n    font-family: var(--mono);\n    font-size: 7px;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    fill: var(--ink-faint);\n  }\n  /* a \"stamp\" — rotated, blocky, ochre — used for STOP/PAUSED/etc */\n  .tg-card svg .schem-stamp-box {\n    fill: none; stroke: var(--ochre); stroke-width: 1.5;\n  }\n  .tg-card svg .schem-stamp-text {\n    font-family: var(--mono);\n    font-weight: 700;\n    font-size: 8.5px;\n    letter-spacing: 0.18em;\n    fill: var(--ochre);\n  }\n  /* hatched fill for the sandbox fence */\n  .tg-card svg .schem-hatch-fill {\n    fill: var(--ink-30);\n    fill-opacity: 0.06;\n  }\n\n  /* ── Animations: each card runs ONE loop. Staggered start delays so\n     the grid never pulses in unison. data-active is toggled by an\n     IntersectionObserver so animations only run when on screen. ── */\n  .tg-card[data-active=\"0\"] svg * { animation-play-state: paused !important; }\n\n  /* FIG 3 — Knows when to stop. Three vertical gauges fill; the third\n     hits its threshold and the STOP stamp drops. */\n  @keyframes tg-fill-1 { 0%,8% {height:0} 30%,100% {height:14px} }\n  @keyframes tg-fill-2 { 0%,18% {height:0} 50%,100% {height:22px} }\n  @keyframes tg-fill-3 {\n    0%,28% {height:0}\n    62% {height:36px}\n    72%,100% {height:36px}\n  }\n  /* Stamp drop: opacity + scale only — using CSS pixel translate inside\n     a viewBox-scaled SVG would push the element off-figure at large\n     rendered sizes, since 1px ≠ 1 viewBox unit. Position via SVG\n     coordinates instead and animate just the entry. */\n  @keyframes tg-stamp-drop {\n    0%, 72% { opacity: 0; transform: scale(1.25); }\n    80%     { opacity: 1; transform: scale(1.0); }\n    100%    { opacity: 1; transform: scale(1.0); }\n  }\n  .tg-fig-stop .gauge-fill { animation-duration: 6s; animation-iteration-count: infinite; animation-timing-function: linear; }\n  .tg-fig-stop .gauge-fill.g1 { animation-name: tg-fill-1; }\n  .tg-fig-stop .gauge-fill.g2 { animation-name: tg-fill-2; }\n  .tg-fig-stop .gauge-fill.g3 { animation-name: tg-fill-3; }\n  .tg-fig-stop .stamp-stop {\n    animation: tg-stamp-drop 6s infinite linear;\n    transform-origin: center;\n    transform-box: fill-box;\n  }\n\n  /* FIG 4 — Climbs when stuck. A ping starts at rung 1 and climbs;\n     at the top, brain stamps. */\n  /* Climb: CSS pixel translate inside an SVG works visually but the\n     magnitudes need to match the rendered card size. The SVG renders\n     ~240px wide at default card size, so 1 viewBox unit ≈ 1.2 px.\n     Rung spacing in SVG units = 18; matching CSS px translate ≈ 22.\n     Keep the SVG-side cy untouched and animate via CSS, but use a\n     conservative magnitude that holds at all card widths. */\n  @keyframes tg-climb {\n    0%   { transform: translateY(0px);   opacity: 0; }\n    8%   { transform: translateY(0px);   opacity: 1; }\n    24%  { transform: translateY(0px);   opacity: 1; }\n    32%  { transform: translateY(-22px); opacity: 1; }\n    48%  { transform: translateY(-22px); opacity: 1; }\n    56%  { transform: translateY(-44px); opacity: 1; }\n    72%  { transform: translateY(-44px); opacity: 1; }\n    80%  { transform: translateY(-66px); opacity: 1; }\n    96%  { transform: translateY(-66px); opacity: 0; }\n    100% { transform: translateY(-66px); opacity: 0; }\n  }\n  /* (.ping is animated via SVG-native <animate>; CSS keyframe removed.) */\n  @keyframes tg-rung-flash {\n    0%, 100% { opacity: 0.4; }\n    50%      { opacity: 1; }\n  }\n  .tg-fig-climb .rung-1 { animation: tg-rung-flash 7s infinite; animation-delay: 0.5s; }\n  .tg-fig-climb .rung-2 { animation: tg-rung-flash 7s infinite; animation-delay: 1.7s; }\n  .tg-fig-climb .rung-3 { animation: tg-rung-flash 7s infinite; animation-delay: 3.3s; }\n  .tg-fig-climb .brain-stamp {\n    animation: tg-stamp-drop 7s infinite ease-in-out;\n    transform-origin: center;\n    transform-box: fill-box;\n  }\n\n  /* FIG 5 — Stays in its lane. Agent dot rattles inside fence.\n     Magnitudes are conservative so the dot stays inside the fence at\n     all rendered sizes (fence is 112 SVG units wide; dot starts mid). */\n  @keyframes tg-rattle {\n    0%   { transform: translate(0px, 0px); }\n    20%  { transform: translate(10px, -4px); }\n    35%  { transform: translate(20px, 3px); }\n    55%  { transform: translate(6px,  7px); }\n    75%  { transform: translate(-9px, 1px); }\n    100% { transform: translate(0px, 0px); }\n  }\n  .tg-fig-fence .agent {\n    animation: tg-rattle 5s infinite ease-in-out;\n    transform-origin: center;\n    transform-box: fill-box;\n  }\n\n  /* FIG 6 — Heals merge conflicts. Two branches collide; check stamps. */\n  @keyframes tg-resolve {\n    0%, 60%   { opacity: 0; }\n    72%       { opacity: 1; }\n    100%      { opacity: 1; }\n  }\n  .tg-fig-merge .resolve { animation: tg-resolve 5s infinite ease-out; }\n  @keyframes tg-merge-flow {\n    0%   { stroke-dashoffset: 60; }\n    100% { stroke-dashoffset: 0; }\n  }\n  .tg-fig-merge .branch-flow {\n    stroke-dasharray: 4 3;\n    animation: tg-merge-flow 3s infinite linear;\n  }\n\n  /* FIG 7 — Survives interruption. Sweep, then lid closes, then opens\n     and sweep continues. */\n  @keyframes tg-sweep {\n    0%   { transform: rotate(0deg); }\n    35%  { transform: rotate(120deg); }\n    /* lid closes — pause */\n    35.1%, 60% { transform: rotate(120deg); }\n    /* lid opens — resume from same position, no jump */\n    100% { transform: rotate(360deg); }\n  }\n  .tg-fig-resume .sweep {\n    animation: tg-sweep 7s infinite linear;\n    transform-origin: 32px 32px;\n  }\n  @keyframes tg-lid-close {\n    0%, 30%   { transform: scaleY(0); opacity: 0; }\n    35%, 58%  { transform: scaleY(1); opacity: 1; }\n    62%, 100% { transform: scaleY(0); opacity: 0; }\n  }\n  .tg-fig-resume .lid {\n    animation: tg-lid-close 7s infinite ease-in-out;\n    transform-origin: center top;\n    transform-box: fill-box;\n  }\n\n  /* FIG 8 — Five log streams converging into morning report. */\n  @keyframes tg-stream-flow {\n    0%   { stroke-dashoffset: 40; }\n    100% { stroke-dashoffset: 0; }\n  }\n  .tg-fig-report .stream {\n    stroke-dasharray: 3 2;\n    animation: tg-stream-flow 4s infinite linear;\n  }\n  .tg-fig-report .stream.s2 { animation-duration: 4.6s; }\n  .tg-fig-report .stream.s3 { animation-duration: 3.4s; }\n  .tg-fig-report .stream.s4 { animation-duration: 5.1s; }\n  .tg-fig-report .stream.s5 { animation-duration: 3.8s; }\n\n  /* FIG 9 — Calmly stops. Single ticket reaches the top and PAUSED\n     stamp lands. Slower, more deliberate cadence. */\n  @keyframes tg-paused-stamp {\n    0%, 60%  { opacity: 0; transform: scale(1.2); }\n    72%      { opacity: 1; transform: scale(1); }\n    100%     { opacity: 1; transform: scale(1); }\n  }\n  .tg-fig-paused .paused-stamp {\n    animation: tg-paused-stamp 8s infinite ease-out;\n    transform-origin: center;\n    transform-box: fill-box;\n  }\n  /* Ticket rise: small CSS-px translate would drift off the figure at\n     scale; use opacity-only entry instead. */\n  @keyframes tg-rise {\n    0%, 8%  { opacity: 0; }\n    24%     { opacity: 1; }\n    100%    { opacity: 1; }\n  }\n  .tg-fig-paused .ticket-rise {\n    animation: tg-rise 8s infinite ease-out;\n    transform-origin: center;\n    transform-box: fill-box;\n  }\n\n  @media (prefers-reduced-motion: reduce) {\n    .tg-card svg * { animation: none !important; }\n  }\n\n  /* ───────────── Install ───────────── */\n  .install {\n    padding: 96px 0 56px;\n    border-top: 1px solid var(--rule-soft);\n    margin-top: 24px;\n    position: relative;\n  }\n  .install .marker {\n    font-family: var(--mono);\n    font-size: 10.5px;\n    color: var(--ink-faint);\n    text-transform: uppercase;\n    letter-spacing: 0.12em;\n    margin-bottom: 14px;\n  }\n  .install h2 {\n    font-family: var(--serif);\n    font-weight: 400;\n    font-size: clamp(36px, 4vw, 56px);\n    letter-spacing: -0.02em;\n    margin: 0 0 28px 0;\n    line-height: 1.05;\n  }\n  .install h2 em { font-style: italic; color: var(--ochre); }\n  .install .ship-lede {\n    font-family: var(--serif);\n    font-size: clamp(15px, 1.2vw, 17px);\n    line-height: 1.55;\n    color: var(--ink-mute);\n    max-width: 720px;\n    margin: 0 0 32px 0;\n  }\n  .install .ship-grid {\n    display: grid;\n    grid-template-columns: repeat(3, minmax(0, 1fr));\n    gap: 18px;\n    max-width: 1100px;\n  }\n  .install .ship-grid.two-col {\n    grid-template-columns: minmax(0, 1.05fr) minmax(0, 1fr);\n    max-width: 980px;\n  }\n  .install .ship-card.required { border-color: var(--ochre); border-width: 1px; box-shadow: 0 1px 0 var(--shadow-tint), 0 12px 28px -22px var(--shadow-tint-deep), inset 3px 0 0 var(--ochre); padding-left: 22px; }\n  .install .ship-card.optional { border-color: var(--blue); border-width: 1px; box-shadow: 0 1px 0 var(--shadow-tint), 0 12px 28px -22px var(--shadow-tint-deep), inset 3px 0 0 var(--blue); padding-left: 22px; }\n  .install .ship-card.optional .ship-num { color: var(--blue); }\n  .install .ship-icon-moon { display: inline-flex; width: 14px; height: 14px; margin-right: 6px; color: var(--blue); vertical-align: -2px; }\n  .install .ship-icon-moon svg { width: 100%; height: 100%; }\n  .install .ship-opt.req { color: var(--ochre); font-style: normal; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; font-size: 10px; }\n  .install .ship-opt.opt { color: var(--blue); font-style: normal; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; font-size: 10px; }\n  .install .ship-card {\n    position: relative;\n    background: var(--parchment-2);\n    border: 1px solid var(--rule);\n    border-radius: 4px;\n    padding: 18px 18px 16px;\n    box-shadow: 0 1px 0 var(--shadow-tint), 0 12px 28px -22px var(--shadow-tint-deep);\n    display: flex; flex-direction: column; gap: 8px;\n  }\n  .install .ship-head {\n    display: flex; align-items: baseline; gap: 10px;\n    font-family: var(--mono); font-size: 10.5px;\n    text-transform: uppercase; letter-spacing: 0.1em;\n    color: var(--ink-faint);\n    border-bottom: 1px solid var(--rule-soft);\n    padding-bottom: 10px; margin-bottom: 4px;\n  }\n  .install .ship-num { color: var(--ochre); font-weight: 600; }\n  .install .ship-tag { color: var(--blue); }\n  .install .ship-opt {\n    margin-left: auto;\n    color: var(--ink-faint);\n    font-style: italic;\n    text-transform: none;\n    letter-spacing: 0;\n    font-size: 10.5px;\n  }\n  .install .ship-name {\n    font-family: var(--serif);\n    font-weight: 400;\n    font-size: clamp(18px, 1.5vw, 22px);\n    line-height: 1.15;\n    margin: 0;\n    letter-spacing: -0.01em;\n  }\n  .install .ship-name code {\n    font-family: var(--mono);\n    font-size: 0.82em;\n    background: var(--grid-tint-strong);\n    color: var(--blue);\n    padding: 1px 6px;\n    border-radius: 3px;\n  }\n  .install .ship-desc {\n    font-family: var(--serif);\n    font-size: 14px;\n    line-height: 1.5;\n    color: var(--ink);\n    margin: 0;\n  }\n  .install .ship-desc code {\n    font-family: var(--mono); font-size: 0.86em;\n    color: var(--blue);\n    background: var(--grid-tint);\n    padding: 1px 4px; border-radius: 2px;\n  }\n  .install .ship-when {\n    font-family: var(--mono); font-size: 11px;\n    color: var(--ink-mute);\n    margin: auto 0 0 0;\n    padding-top: 10px;\n    border-top: 1px dashed var(--rule-soft);\n    line-height: 1.5;\n  }\n  .install .ship-when .k { color: var(--ink-faint); margin-right: 4px; }\n  .install .install-cta {\n    font-family: var(--mono); font-size: 13px;\n    color: var(--parchment);\n    background: var(--ink);\n    padding: 8px 14px; border-radius: 3px;\n    text-decoration: none; border-bottom: none !important;\n    transition: background 0.2s ease;\n  }\n  .install .install-cta:hover { background: var(--blue); color: var(--parchment); }\n  @media (max-width: 900px) {\n    .install .ship-grid { grid-template-columns: 1fr; }\n  }\n  .install .repo-line {\n    margin-top: 32px;\n    display: flex; align-items: baseline; gap: 18px; flex-wrap: wrap;\n  }\n  .install .repo-line a {\n    font-family: var(--mono); font-size: 14px;\n    color: var(--ink); text-decoration: none;\n    border-bottom: 1px solid var(--ochre); padding-bottom: 1px;\n  }\n  .install .repo-line a:hover { color: var(--ochre); }\n  .install .repo-meta {\n    font-family: var(--mono); font-size: 11px;\n    color: var(--ink-faint); letter-spacing: 0.04em;\n  }\n\n  /* ───────────── Footer ───────────── */\n  footer {\n    margin-top: 72px;\n    padding: 32px 0 48px;\n    border-top: 1px solid var(--rule-soft);\n    display: flex;\n    justify-content: space-between;\n    align-items: flex-end;\n    gap: 32px;\n    flex-wrap: wrap;\n    font-family: var(--mono);\n    font-size: 12px;\n    color: var(--ink-mute);\n  }\n  footer .links { display: flex; gap: 22px; }\n  footer .links a {\n    color: var(--ink);\n    text-decoration: none;\n    border-bottom: 1px solid var(--rule-soft);\n    padding-bottom: 1px;\n  }\n  footer .links a:hover { border-color: var(--ochre); color: var(--ochre); }\n  footer .author {\n    font-family: var(--serif);\n    font-size: 14px;\n    color: var(--ink-mute);\n    max-width: 44ch;\n    line-height: 1.4;\n  }\n  footer .author-aside {\n    display: block;\n    margin-top: 8px;\n    font-size: 12.5px;\n    color: var(--ink-faint);\n    line-height: 1.55;\n    font-style: italic;\n  }\n  footer .author-aside code {\n    font-style: normal;\n    font-family: var(--mono);\n    font-size: 11px;\n    color: var(--ink-mute);\n    background: var(--parchment-2);\n    padding: 1px 5px;\n    border-radius: 2px;\n  }\n  footer .author-aside a {\n    color: var(--blue);\n    text-decoration: none;\n    border-bottom: 1px solid var(--blue-faint);\n    font-style: normal;\n    font-family: var(--mono);\n    font-size: 11.5px;\n  }\n  footer .author-aside a:hover {\n    color: var(--ochre);\n    border-color: var(--ochre);\n  }\n  footer .author a { color: var(--ink); border-bottom: 1px solid var(--ochre); text-decoration: none; padding-bottom: 1px; }\n\n  /* Optical type polish */\n  body { font-feature-settings: \"liga\" 1, \"kern\" 1, \"onum\" 1, \"ss01\" 1; }\n  .term, .mono, code, .gloss, .sec .margin .ticks, .sec .margin .num { font-feature-settings: \"tnum\" 1, \"zero\" 1; font-variant-numeric: tabular-nums; }\n\n  /* ───────────── Self-correction (Research) ───────────── */\n  .self-correct .strike {\n    position: relative;\n    color: var(--ink-faint);\n    font-style: italic;\n    font-weight: 400;\n    margin-right: 4px;\n    transition: opacity 0.4s ease;\n  }\n  .self-correct .strike::after {\n    content: \"\";\n    position: absolute;\n    left: -2px; right: -2px;\n    top: 52%;\n    height: 0;\n    border-top: 1.4px solid var(--ochre);\n    transform: scaleX(0);\n    transform-origin: left center;\n    transition: transform 0.5s ease;\n  }\n  .self-correct .replace {\n    font-style: italic;\n    font-weight: 400;\n    color: var(--ink-2);\n    opacity: 0;\n    margin-left: 0;\n    max-width: 0;\n    display: inline-block;\n    overflow: hidden;\n    white-space: nowrap;\n    vertical-align: baseline;\n    transition: opacity 0.4s ease 0.5s, max-width 0.6s ease 0.5s, margin-left 0.4s ease 0.5s;\n  }\n  .sec.locked .self-correct .strike::after { transform: scaleX(1); }\n  .sec.locked .self-correct .replace { opacity: 1; max-width: 220px; margin-left: 4px; }\n\n  /* Phrase underline targets — pencil swoop on lock */\n  .u-target {\n    position: relative;\n    display: inline;\n    background-image: linear-gradient(to right, var(--ochre), var(--ochre));\n    background-repeat: no-repeat;\n    background-size: 0% 1px;\n    background-position: 0 100%;\n    padding-bottom: 2px;\n    transition: background-size 0.7s cubic-bezier(0.3, 0.6, 0.3, 1) 0.4s;\n  }\n  .sec.locked .u-target { background-size: 100% 1px; }\n\n  /* Following ink cursor (global, fixed-positioned dot+nib) */\n  .ink-follow {\n    position: fixed;\n    z-index: 40;\n    width: 14px; height: 18px;\n    color: var(--ink);\n    pointer-events: none;\n    opacity: 0;\n    transform: translate3d(0,0,0);\n    transition: opacity 0.4s ease;\n  }\n  .ink-follow.visible { opacity: 0.78; }\n  .ink-follow.night { color: var(--parchment); }\n\n  /* ───────────── Pipeline section ───────────── */\n  /* ─── Tweaks panel (vanilla, matches design language) ─── */\n  .tweaks-panel {\n    position: fixed;\n    right: 24px;\n    bottom: 24px;\n    width: 308px;\n    background: var(--parchment);\n    border: 1px solid var(--rule);\n    box-shadow: 0 18px 60px -28px rgba(15,18,25,0.4), 0 4px 18px -10px rgba(15,18,25,0.2);\n    font-family: var(--ui);\n    color: var(--ink);\n    z-index: 9999;\n    display: none;\n  }\n  .tweaks-panel.show { display: block; }\n  .tweaks-panel .tw-head {\n    display: flex; align-items: baseline; justify-content: space-between;\n    padding: 14px 16px 10px;\n    border-bottom: 1px solid var(--rule-soft);\n    background: var(--parchment-2);\n  }\n  .tweaks-panel .tw-head .tw-title {\n    font-family: var(--mono); font-size: 11px;\n    text-transform: uppercase; letter-spacing: 0.18em;\n    color: var(--ink);\n  }\n  .tweaks-panel .tw-head .tw-stamp {\n    font-family: var(--mono); font-size: 9.5px;\n    color: var(--ochre); letter-spacing: 0.14em; text-transform: uppercase;\n  }\n  .tweaks-panel .tw-close {\n    position: absolute; top: 10px; right: 12px;\n    background: transparent; border: none; cursor: pointer;\n    font-family: var(--mono); font-size: 16px; color: var(--ink-faint); line-height: 1;\n  }\n  .tweaks-panel .tw-close:hover { color: var(--ochre); }\n  .tweaks-panel .tw-body { padding: 16px; }\n  .tweaks-panel .tw-group { margin-bottom: 18px; }\n  .tweaks-panel .tw-group:last-child { margin-bottom: 0; }\n  .tweaks-panel .tw-label {\n    font-family: var(--mono); font-size: 10px;\n    text-transform: uppercase; letter-spacing: 0.16em;\n    color: var(--ink-faint); margin-bottom: 4px;\n  }\n  .tweaks-panel .tw-name {\n    font-family: var(--serif); font-size: 18px;\n    color: var(--ink); margin-bottom: 2px; letter-spacing: -0.01em;\n  }\n  .tweaks-panel .tw-desc {\n    font-family: var(--serif); font-style: italic;\n    font-size: 12.5px; color: var(--ink-mute);\n    margin-bottom: 10px; line-height: 1.45; min-height: 2.6em;\n  }\n  .tweaks-panel .tw-seg {\n    display: grid; grid-template-columns: repeat(3, 1fr);\n    border: 1px solid var(--rule);\n  }\n  .tweaks-panel .tw-seg button {\n    background: var(--parchment);\n    border: none;\n    border-right: 1px solid var(--rule-soft);\n    padding: 9px 6px;\n    font-family: var(--mono); font-size: 10.5px;\n    text-transform: uppercase; letter-spacing: 0.08em;\n    color: var(--ink-mute);\n    cursor: pointer;\n    transition: background 0.15s ease, color 0.15s ease;\n  }\n  .tweaks-panel .tw-seg button:last-child { border-right: none; }\n  .tweaks-panel .tw-seg button:hover { color: var(--ink); background: var(--parchment-2); }\n  .tweaks-panel .tw-seg button.on {\n    background: var(--ink); color: var(--parchment);\n  }\n  /* dark-mode tweaks panel adjustments */\n  html[data-stain=\"carbon\"] .tweaks-panel .tw-seg button.on {\n    background: var(--ochre); color: var(--ink);\n  }\n\n  /* ─── Carbon-specific component lifts ─── */\n  /* terminal: clearer separation between bg and inset */\n  html[data-stain=\"carbon\"] .term {\n    background: #0d0d11;\n    border-color: #2c2c34;\n    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 24px 60px -32px rgba(0,0,0,0.6);\n  }\n  html[data-stain=\"carbon\"] .term .bar {\n    background: linear-gradient(180deg, #1a1a20, #131318);\n    border-bottom-color: #2c2c34;\n  }\n  /* spec cards & sec cards: lift off the page in carbon */\n  html[data-stain=\"carbon\"] .spec-card,\n  html[data-stain=\"carbon\"] .sec {\n    background: #1a1a1f;\n    border-color: #33333c;\n    box-shadow: 0 1px 0 rgba(255,255,255,0.02), 0 18px 40px -28px rgba(0,0,0,0.65);\n  }\n  /* locked sec cards in carbon: warm ochre breath instead of cool blue */\n  html[data-stain=\"carbon\"] .sec.locked {\n    background: #1d1d22;\n    border-color: var(--blue-faint);\n    box-shadow:\n      inset 3px 0 0 0 var(--blue),\n      0 1px 0 rgba(255,255,255,0.03),\n      0 22px 50px -32px rgba(138, 166, 227, 0.22),\n      0 0 0 1px rgba(240, 184, 112, 0.04);\n  }\n  html[data-stain=\"carbon\"] .sec.locked .body { color: var(--ink-2); }\n  html[data-stain=\"carbon\"] .sec .body { color: var(--ink-mute); }\n  /* spec card body color clearer */\n  html[data-stain=\"carbon\"] .spec-card .frontmatter .row .v { color: var(--ink-2); }\n  html[data-stain=\"carbon\"] .spec-card .frontmatter .row .v.empty { color: var(--ink-faint); }\n  /* meta-spec sidebar in carbon */\n  html[data-stain=\"carbon\"] .ms-fm {\n    background: #0f0f13;\n    border-color: #2c2c34;\n  }\n  html[data-stain=\"carbon\"] .ms-gates li.cleared .ms-name { color: var(--ink); }\n  /* page background grain a touch warmer in carbon */\n  html[data-stain=\"carbon\"] body::before {\n    background-image:\n      radial-gradient(rgba(236, 230, 211, 0.022) 1px, transparent 1px),\n      radial-gradient(rgba(240, 184, 112, 0.018) 1px, transparent 1px);\n  }\n  /* pipe-stage grid uses warmer rule in carbon */\n  html[data-stain=\"carbon\"] . class=\"hf-body\">\n        <div class=\"hf-source\">\n          <span class=\"hf-source-tag\">specs/ · 4 ready<\u002Fspan>\n          <div class=\"hf-source-list\">\n            <div class=\"hf-source-item\"><span class=\"hf-source-name\">nightline-loop<\u002Fspan><span class=\"hf-source-scope\">L<\u002Fspan><span class=\"hf-source-rev\">R3<\u002Fspan><\u002Fdiv>\n            <div class=\"hf-source-item\"><span class=\"hf-source-name\">dawn-reveal<\u002Fspan><span class=\"hf-source-scope\">M<\u002Fspan><span class=\"hf-source-rev\">R2<\u002Fspan><\u002Fdiv>\n            <div class=\"hf-source-item\"><span class=\"hf-source-name\">tackle-progression<\u002Fspan><span class=\"hf-source-scope\">XL<\u002Fspan><span class=\"hf-source-rev\">R5<\u002Fspan><\u002Fdiv>\n            <div class=\"hf-source-item\"><span class=\"hf-source-name\">weather-tables<\u002Fspan><span class=\"hf-source-scope\">S<\u002Fspan><span class=\"hf-source-rev\">R1<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"hf-connector\" aria-hidden=\"true\">\n          <svg viewBox=\"0 0 80 200\" preserveAspectRatio=\"none\">\n            <!-- spine: short rule from left edge to fork -->\n            <path class=\"hf-spine\" d=\"M 0 100 L 32 100\"><\u002Fpath>\n            <!-- top branch: rises into the top option card -->\n            <path class=\"hf-branch over\" d=\"M 32 100 L 50 50 L 80 50\"><\u002Fpath>\n            <!-- bottom branch: drops into the bottom option card -->\n            <path class=\"hf-branch guided\" d=\"M 32 100 L 50 150 L 80 150\"><\u002Fpath>\n            <!-- fork node + halo at the split -->\n            <circle class=\"hf-fork-halo\" cx=\"32\" cy=\"100\" r=\"9\"><\u002Fcircle>\n            <circle class=\"hf-fork-node\" cx=\"32\" cy=\"100\" r=\"3.5\"><\u002Fcircle>\n          <\u002Fsvg>\n        <\u002Fdiv>\n\n        <div class=\"hf-options\">\n          <div class=\"hf-opt over\">\n            <span class=\"hf-opt-icon\" aria-hidd
