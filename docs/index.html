>One ticket at a time, planned and implemented in-terminal. Can implement in a mini-autonomous pipeline/worktree or in session on the current branch or feature branch.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fsection>\n\n  <!-- ───────── Lifecycle playground (the framework's gate map — abstract first) ───────── -->\n  <section class=\"playground-section\" id=\"playground\">\n    <div class=\"pg-header\">\n      <div class=\"marker\">§02 · lifecycle playground<\u002Fdiv>\n      <h2 class=\"pg-title\">The same lifecycle, <em>three different gate sequences.<\u002Fem><\u002Fh2>\n      <p class=\"pg-lede\">Frontmatter declares <code>complexity<\u002Fcode> and <code>criticality<\u002Fcode>. Those two values decide which gates fire. Drag the slider — a ghost-train runs the new sequence so you can see exactly which phases the framework forces.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"pg-body\">\n      <div class=\"pg-controls\">\n        <div class=\"label\">complexity<\u002Fdiv>\n        <input type=\"range\" min=\"0\" max=\"2\" step=\"1\" value=\"0\" class=\"pg-slider\" id=\"pg-slider\">\n        <div class=\"pg-ticks\">\n          <span class=\"cur\" id=\"pgt-0\">simple<\u002Fspan>\n          <span id=\"pgt-1\">complex<\u002Fspan>\n          <span id=\"pgt-2\">critical<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"pg-readout\" id=\"pg-readout\">small change, low blast radius. skip the review gate; ship in one pass.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pg-canvas\">\n        <svg class=\"pg-svg\" id=\"pg-svg\" viewBox=\"0 0 800 240\" preserveAspectRatio=\"xMidYMid meet\"><\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ───────── Spec stream (locking) — concrete walkthrough of the gates above ───────── -->\n  <section class=\"spec-stream\" id=\"spec-stream\">\n    <div class=\"stream-header\">\n      <span>§03 · /refine writes the spec · scrolls to lock<\u002Fspan>\n      <span>4 gates · 0 of 4 cleared<\u002Fspan>\n    <\u002Fdiv>\n\n    <article class=\"sec\" data-phase=\"clarify\" id=\"sec-clarify\">\n      <span class=\"redline\" style=\"top:-12px; right:-180px;\">this gate exists because i kept skipping it and paying for it at review.<\u002Fspan>\n      <div class=\"margin\">\n        <div class=\"num\">§ 01<\u002Fdiv>\n        <div class=\"ticks\">\n          <span class=\"gate-count\">3/3<\u002Fspan>\n          <span class=\"gate-label\">scope agreed<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"leader\"><\u002Fdiv>\n      <div class=\"rev\">R3<\u002Fdiv>\n      <span class=\"stamp\">phase complete<\u002Fspan>\n      <h3>Clarify <span class=\"phase-tag\">phase 01<\u002Fspan><span class=\"gloss\" title=\"lifecycle's first phase: pin the unknowns\">the lifecycle's first phase<\u002Fspan><\u002Fh3>\n      <div class=\"status-line\">status: <span class=\"ok\">drafting → locked<\u002Fspan> · acceptance: scope agreed<\u002Fdiv>\n      <div class=\"body\">\n        <span class=\"placeholder\">[ pending — scroll to capture from interview ]<\u002Fspan>\n        <div class=\"real\">\n          What does it feel like to set a nightline well? Player loop: <em>choose tackle → cast at dusk → set depth → leave the line → return at dawn.<\u002Fem> Fish simulated overnight. Catch determined by depth, bait, weather, patience. Scope-in: a satisfying choice + <span class=\"u-target\" data-u=\"clarify\">a felt morning<\u002Fspan>.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"sec\" data-phase=\"research\" id=\"sec-research\">\n      <div class=\"margin\">\n        <div class=\"num\">§ 02<\u002Fdiv>\n        <div class=\"ticks\">\n          <span class=\"gate-count\">3/3<\u002Fspan>\n          <span class=\"gate-label\">refs cited<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"leader\"><\u002Fdiv>\n      <div class=\"rev\">R3<\u002Fdiv>\n      <span class=\"stamp\">phase complete<\u002Fspan>\n      <h3>Research <span class=\"phase-tag\">phase 02<\u002Fspan><\u002Fh3>\n      <div class=\"status-line\">status: <span class=\"ok\">collecting → locked<\u002Fspan> · 4 sources cited<\u002Fdiv>\n      <div class=\"body\">\n        <span class=\"placeholder\">[ pending — research bullets resolve here ]<\u002Fspan>\n        <div class=\"real\">\n          <ul>\n            <li><strong>Stardew Valley:<\u002Fstrong> tight skill window, instant feedback.<\u002Fli>\n            <li><strong class=\"self-correct\"><span class=\"strike\">Animal Crossing<\u002Fspan><span class=\"replace\">Sea of Thieves<\u002Fspan><\u002Fstrong>: fishing as social ritual.<\u002Fli>\n            <li><strong>Dredge:<\u002Fstrong> dread, reward, depth as risk axis.<\u002Fli>\n            <li><strong>Real-world nightline:<\u002Fstrong> hooks set at dusk, retrieved at dawn — a <span class=\"u-target\" data-u=\"research\">sleep-while-you-fish<\u002Fspan> craft.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"sec\" data-phase=\"specify\" id=\"sec-specify\">\n      <div class=\"margin\">\n        <div class=\"num\">§ 03<\u002Fdiv>\n        <div class=\"ticks\">\n          <span class=\"gate-count\">3/3<\u002Fspan>\n          <span class=\"gate-label\">OUTCOME NAMED<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"leader\"><\u002Fdiv>\n      <div class=\"rev\">R3<\u002Fdiv>\n      <span class=\"stamp\">phase complete<\u002Fspan>\n      <h3>Specify <span class=\"phase-tag\">phase 03<\u002Fspan><\u002Fh3>\n      <div class=\"status-line\">status: <span class=\"ok\">resolving → locked<\u002Fspan> · acceptance criteria pinned<\u002Fdiv>\n      <div class=\"body\">\n        <span class=\"placeholder\">[ pending — system + edge cases resolve here ]<\u002Fspan>\n        <div class=\"real\">\n          Tackle: 3 rod tiers, 6 lure types, 4 bait types. Depth: 1–5 fathoms. Weather modifies catch table per fathom. Overnight simulation: discrete tick at midnight resolves bites against a Markov model parameterized by depth/bait/weather. Morning UI: animated reveal of the line being pulled. Edge cases: empty, snagged, legendary.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"sec\" data-phase=\"plan\" id=\"sec-plan\">\n      <span class=\"redline\" style=\"top:-10px; right:-180px;\">the soul of the feature. mock it badly and the loop collapses. ask me how i know.<\u002Fspan>\n      <div class=\"margin\">\n        <div class=\"num\">§ 04<\u002Fdiv>\n        <div class=\"ticks\">\n          <span class=\"gate-count\">3/3<\u002Fspan>\n          <span class=\"gate-label\">risks named<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"leader\"><\u002Fdiv>\n      <div class=\"rev\">R3<\u002Fdiv>\n      <span class=\"stamp\">phase complete<\u002Fspan>\n      <h3>Plan <span class=\"phase-tag\">phase 04<\u002Fspan><span class=\"gloss\" title=\"adversarial review by a fresh agent\">/critical-review available before approval<\u002Fspan><\u002Fh3>\n      <div class=\"status-line\">status: <span class=\"ok\">drafting → locked<\u002Fspan> · 5 tasks · 1 named risk<\u002Fdiv>\n      <div class=\"body\">\n        <span class=\"placeholder\">[ pending — implementation order resolves here ]<\u002Fspan>\n        <div class=\"real\">\n          Implementation: <em>(a)<\u002Fem> tackle data model + UI, <em>(b)<\u002Fem> cast/set screen, <em>(c)<\u002Fem> overnight resolver, <em>(d)<\u002Fem> dawn reveal animation, <em>(e)<\u002Fem> catch encyclopedia. Acceptance: a player who sets a line and sleeps wakes to a result that feels earned. Risk: the resolver is <span class=\"u-target\" data-u=\"plan\">the soul of the feature<\u002Fspan>; mock it badly and the loop collapses.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n  <\u002Fsection>\n\n  <!-- ───────── Pipeline activation (sticky scrub) ───────── -->\n  <section class=\"pipe-wrap\" id=\"pipe-section\">\n    <div class=\"pipe-stage\" id=\"pipe-stage\">\n      <div class=\"starfield\" aria-hidden=\"true\"><\u002Fdiv>\n\n      <div class=\"pipe-header\">§04 · the overnight payoff · scroll to scrub<\u002Fdiv>\n      <h2 class=\"pipe-title\">If a spec earns it, <em>this is what handoff looks like.<\u002Fem><\u002Fh2>\n\n      <svg class=\"pipe-svg\" id=\"pipe-svg\" viewBox=\"0 0 1800 960\" preserveAspectRatio=\"xMidYMid meet\"><\u002Fsvg>\n\n      <!-- Inline \"under the hood\" annotations — appear as the rail activates -->\n      <div class=\"pipe-annot\" id=\"annot-discovery\" style=\"left: 14%; top: 30%;\">\n        spawns 4 research branches in parallel — one rail per reference signal\n      <\u002Fdiv>\n      <div class=\"pipe-annot\" id=\"annot-refine\" style=\"left: 47%; top: 70%;\">\n        each ticket runs in its own claude window · clears spec → research → critical-review before it earns a plan\n      <\u002Fdiv>\n      <div class=\"pipe-annot\" id=\"annot-morning\" style=\"right: 4%; top: 70%;\">\n        merges PRs · closes lifecycles · drops a morning-report.md you can skim with coffee\n      <\u002Fdiv>\n\n      <!-- Vertical manifest fallback — shown below 900px instead of the SVG -->\n      <ol class=\"pipe-manifest\" aria-label=\"overnight pipeline as a vertical manifest\">\n        <li class=\"pm-row\">\n          <span class=\"pm-dot\"><\u002Fspan>\n          <div>\n            <div class=\"pm-name\">spec earned<\u002Fdiv>\n            <div class=\"pm-sub\">lifecycle/{slug}/spec.md<\u002Fdiv>\n            <div class=\"pm-detail\">all four phases locked. the orchestrator now has a tight enough spec to work without you.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fli>\n        <li class=\"pm-row fanout\">\n          <span class=\"pm-dot\"><\u002Fspan>\n          <div>\n            <div class=\"pm-name\">/discovery — fan-out<\u002Fdiv>\n            <div class=\"pm-sub\">lifecycle-research/{topic}/*.md<\u002Fdiv>\n            <div class=\"pm-detail\">spawns research branches in parallel — one rail per reference signal.<\u002Fdiv>\n            <ul class=\"pm-children\">\n              <li class=\"pm-child\">→ Stardew Valley · feedback-loop ref<\u002Fli>\n              <li class=\"pm-child\">→ Sea of Thieves · social-ritual ref<\u002Fli>\n              <li class=\"pm-child\">→ Dredge · depth-as-risk ref<\u002Fli>\n              <li class=\"pm-child\">→ real-world nightline · sleep-while-you-fish craft<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n        <\u002Fli>\n        <li class=\"pm-row\">\n          <span class=\"pm-dot\"><\u002Fspan>\n          <div>\n            <div class=\"pm-name\">backlog · 5 tickets<\u002Fdiv>\n            <div class=\"pm-sub\">backlog/NNN-*.md<\u002Fdiv>\n            <div class=\"pm-detail\">discovery converges into named, refinable tickets.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fli>\n        <li class=\"pm-row fanout\">\n          <span class=\"pm-dot\"><\u002Fspan>\n          <div>\n            <div class=\"pm-name\">/refine — per ticket<\u002Fdiv>\n            <div class=\"pm-sub\">clarify · research · spec · plan · critical-review<\u002Fdiv>\n            <div class=\"pm-detail\">each ticket clears its own gates. five tickets → five tight specs.<\u002Fdiv>\n            <ul class=\"pm-children\">\n              <li class=\"pm-child\">→ tackle data model<\u002Fli>\n              <li class=\"pm-child\">→ cast/set screen<\u002Fli>\n              <li class=\"pm-child\">→ overnight resolver<\u002Fli>\n              <li class=\"pm-child\">→ dawn reveal anim<\u002Fli>\n              <li class=\"pm-child\">→ catch encyclopedia<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n        <\u002Fli>\n        <li class=\"pm-row\">\n          <span class=\"pm-dot\"><\u002Fspan>\n          <div>\n            <div class=\"pm-name\">/overnight — parallel rails<\u002Fdiv>\n            <div class=\"pm-sub\">overnight-state.json · MCP server<\u002Fdiv>\n            <div class=\"pm-detail\">orchestrator runs the tickets in parallel. <code>read_spec → advance_phase<\u002Fcode> per ticket. branches and PRs created as they pass critical-review.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fli>\n        <li class=\"pm-row gold\">\n          <span class=\"pm-dot\"><\u002Fspan>\n          <div>\n            <div class=\"pm-name\">/morning-review — converge<\u002Fdiv>\n            <div class=\"pm-sub\">lifecycle/morning-report.md<\u002Fdiv>\n            <div class=\"pm-detail\">merges PRs · closes lifecycles · drops a report you can skim with coffee.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fli>\n      <\u002Fol>\n\n      <div class=\"timeline-bar\">\n        <span id=\"t-label\">draw<\u002Fspan>\n        <div class=\"track\"><div class=\"fill\" id=\"t-fill\"><\u002Fdiv><\u002Fdiv>\n        <div class=\"seg\">\n          <span>discovery<\u002Fspan>\n          <span>refine<\u002Fspan>\n          <span>night<\u002Fspan>\n          <span>dawn<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"pipe-tip\" id=\"pipe-tip\">\n      <div class=\"name\">—<\u002Fdiv>\n      <div class=\"path\">—<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Playground moved up to sit with the lifecycle/spec section -->\n\n  <!-- ───────── §05 · Trust grid · what the harness does when you're not watching ───────── -->\n  <section class=\"trust-grid\" id=\"trust-grid\" aria-labelledby=\"tg-h\">\n    <span class=\"redline\" style=\"top:8px; right:0;\">if you can't show me the kill switch, i can't leave it running.<\u002Fspan>\n    <div class=\"marker\">§05 · /overnight · operational guarantees<\u002Fdiv>\n    <h2 id=\"tg-h\">Inside <code style=\"font-family:var(--mono); font-size:0.78em; font-weight:500; letter-spacing:0;\">/overnight<\u002Fcode> · <em>the safety contract.<\u002Fem><\u002Fh2>\n    <div class=\"tg-cards\">\n\n      <!-- FIG 3 — Knows when to stop. -->\n      <article class=\"tg-card\" data-fig=\"fig 3\" data-active=\"0\">\n        <h4>Knows when to stop.<\u002Fh4>\n        <div class=\"tg-frame\">\n          <svg viewBox=\"0 0 220 120\" preserveAspectRatio=\"xMidYMid meet\" class=\"tg-fig-stop\" aria-hidden=\"true\">\n            <!-- Three vertical \"circuit breaker\" gauges. Each gauge is a column\n                 from y=20 (top, where caps live) to y=80 (bottom). Bars are\n                 rendered as discrete chunks stacked from the bottom. Each\n                 chunk is 1 unit of count (rounds / hours / failures); the\n                 cap dashed line sits where that gauge's threshold is.\n                 Animations stagger chunk opacity so bars appear to fill. -->\n\n            <!-- GAUGE 1 · zero-progress rounds (5 chunks, fills to dashed cap @ y=42)\n                 column body y=20..80 (60 tall); 5 chunks of 12 each from y=80 up.\n                 chunks 5..1 sit at y=68,56,44,32,20 — first 3 chunks fill (to y=44),\n                 stopping just under the cap line at y=42. -->\n            <text class=\"schem-cap\" x=\"22\" y=\"14\" text-anchor=\"middle\">rounds<\u002Ftext>\n            <rect class=\"schem-rect\" x=\"14\" y=\"20\" width=\"16\" height=\"60\" rx=\"1\"><\u002Frect>\n            <line class=\"schem-line dashed\" x1=\"11\" y1=\"42\" x2=\"33\" y2=\"42\"><\u002Fline>\n            <text class=\"schem-tag dim\" x=\"36\" y=\"44\">5×<\u002Ftext>\n            <!-- chunk 5 (bottom) -->\n            <rect class=\"g1-chunk c1\" x=\"16\" y=\"68\" width=\"12\" height=\"10\" fill=\"var(--blue)\" opacity=\"0\">\n              <animate attributeName=\"opacity\" values=\"0;0;0.7;0.7\" keyTimes=\"0;0.06;0.14;1\" dur=\"6s\" repeatCount=\"indefinite\"><\u002Fanimate>\n            <\u002Frect>\n            <rect class=\"g1-chunk c2\" x=\"16\" y=\"56\" width=\"12\" height=\"10\" fill=\"var(--blue)\" opacity=\"0\">\n              <animate attributeName=\"opacity\" values=\"0;0;0.7;0.7\" keyTimes=\"0;0.16;0.22;1\" dur=\"6s\" repeatCount=\"indefinite\"><\u002Fanimate>\n            <\u002Frect>\n            <rect class=\"g1-chunk c3\" x=\"16\" y=\"44\" width=\"12\" height=\"10\" fill=\"var(--blue)\" opacity=\"0\">\n              <animate attributeName=\"opacity\" values=\"0;0;0.7;0.7\" keyTimes=\"0;0.24;0.30;1\" dur=\"6s\" repeatCount=\"indefinite\"><\u002Fanimate>\n            <\u002Frect>\n\n            <!-- GAUGE 2 · time (6 chunks of ~10 each, 6h elapsed of 10h cap @ y=32) -->\n            <text class=\"schem-cap\" x=\"68\" y=\"14\" text-anchor=\"middle\">time<\u002Ftext>\n            <rect class=\"schem-rect\" x=\"60\" y=\"20\" width=\"16\" height=\"60\" rx=\"1\"><\u002Frect>\n            <line class=\"schem-line dashed\" x1=\"57\" y1=\"32\" x2=\"79\" y2=\"32\"><\u002Fline>\n            <text class=\"schem-tag dim\" x=\"82\" y=\"34\">10h<\u002Ftext>\n            <!-- 6 chunks from y=70 up to y=20 (chunk size 10, gap implied by stroke):\n                 we'll render 6 chunks @ y=70,60,50,40,30,20. fill 6 of them to reach cap. -->\n            <rect class=\"g2-chunk\" x=\"62\" y=\"70\" width=\"12\" height=\"8\" fill=\"var(--blue)\" opacity=\"0\">\n              <animate attributeName=\"opacity\" values=\"0;0;0.7;0.7\" keyTimes=\"0;0.10;0.16;1\" dur=\"6s\" repeatCount=\"indefinite\"><\u002Fanimate>\n            <\u002Frect>\n            <rect class=\"g2-chunk\" x=\"62\" y=\"60\" width=\"12\" height=\"8\" fill=\"var(--blue)\" opacity=\"0\">\n              <animate attributeName=\"opacity\" values=\"0;0;0.7;0.7\" keyTimes=\"0;0.18;0.24;1\" dur=\"6s\" repeatCount=\"indefinite\"><\u002Fanimate>\n            <\u002Frect>\n            <rect class=\"g2-chunk\" x=\"62\" y=\"50\" width=\"12\" height=\"8\" fill=\"var(--blue)\" opacity=\"0\">\n              <animate attributeName=\"opacity\" values=\"0;0;0.7;0.7\" keyTimes=\"0;0.26;0.32;1\" dur=\"6s\" repeatCount=\"indefinite\"><\u002Fanimate>\n            <\u002Frect>\n            <rect class=\"g2-chunk\" x=\"62\" y=\"40\" width=\"12\" height=\"8\" fill=\"var(--blue)\" opacity=\"0\">\n              <animate attributeName=\"opacity\" values=\"0;0;0.7;0.7\" keyTimes=\"0;0.34;0.40;1\" dur=\"6s\" repeatCount=\"indefinite\"><\u002Fanimate>\n            <\u002Frect>\n\n            <!-- GAUGE 3 · failures — this one trips (5 chunks, fills to cap @ y=22)\n                 chunks @ y=68,56,44,32,20 — all 5 fill in sequence. -->\n            <text class=\"schem-cap\" x=\"114\" y=\"14\" text-anchor=\"middle\">fails<\u002Ftext>\n            <rect class=\"schem-rect alarm\" x=\"106\" y=\"20\" width=\"16\" height=\"60\" rx=\"1\"><\u002Frect>\n            <line class=\"schem-line ochre\" x1=\"103\" y1=\"22\" x2=\"125\" y2=\"22\"><\u002Fline>\n            <text class=\"schem-tag ochre\" x=\"128\" y=\"24\">cap<\u002Ftext>\n            <rect class=\"g3-chunk\" x=\"108\" y=\"68\" width=\"12\" height=\"10\" fill=\"var(--ochre)\" opacity=\"0\">\n              <animate attributeName=\"opacity\" values=\"0;0;0.85;0.85\" keyTimes=\"0;0.20;0.28;1\" dur=\"6s\" repeatCount=\"indefinite\"><\u002Fanimate>\n            <\u002Frect>\n            <rect class=\"g3-chunk\" x=\"108\" y=\"56\" width=\"12\" height=\"10\" fill=\"var(--ochre)\" opacity=\"0\">\n              <animate attributeName=\"opacity\" values=\"0;0;0.85;0.85\" keyTimes=\"0;0.32;0.38;1\" dur=\"6s\" repeatCount=\"indefinite\"><\u002Fanimate>\n            <\u002Frect>\n            <rect class=\"g3-chunk\" x=\"108\" y=\"44\" width=\"12\" height=\"10\" fill=\"var(--ochre)\" opacity=\"0\">\n              <animate attributeName=\"opacity\" values=\"0;0;0.85;0.85\" keyTimes=\"0;0.42;0.48;1\" dur=\"6s\" repeatCount=\"indefinite\"><\u002Fanimate>\n            <\u002Frect>\n            <rect class=\"g3-chunk\" x=\"108\" y=\"32\" width=\"12\" height=\"10\" fill=\"var(--ochre)\" opacity=\"0\">\n              <animate attributeName=\"opacity\" values=\"0;0;0.85;0.85\" keyTimes=\"0;0.52;0.58;1\" dur=\"6s\" repeatCount=\"indefinite\"><\u002Fanimate>\n            <\u002Frect>\n            <rect class=\"g3-chunk\" x=\"108\" y=\"22\" width=\"12\" height=\"8\" fill=\"var(--ochre)\" opacity=\"0\">\n              <animate attributeName=\"opacity\" values=\"0;0;0.85;0.85\" keyTimes=\"0;0.62;0.68;1\" dur=\"6s\" repeatCount=\"indefinite\"><\u002Fanimate>\n            <\u002Frect>\n\n            <!-- STOP stamp — moved right of gauge 3 into the empty zone -->\n            <g class=\"stamp-stop\" style=\"opacity:0\">\n              <animate attributeName=\"opacity\" values=\"0;0;0;1;1\" dur=\"6s\" repeatCount=\"indefinite\" keyTimes=\"0; 0.68; 0.72; 0.78; 1\"><\u002Fanimate>\n              <g transform=\"translate(155 36) rotate(-10)\">\n                <rect class=\"schem-stamp-box\" x=\"0\" y=\"0\" width=\"44\" height=\"18\" rx=\"1\"><\u002Frect>\n                <text class=\"schem-stamp-text\" x=\"22\" y=\"13\" text-anchor=\"middle\">STOP<\u002Ftext>\n              <\u002Fg>\n            <\u002Fg>\n\n            <!-- bottom rule + caption -->\n            <line class=\"schem-line\" x1=\"10\" y1=\"92\" x2=\"210\" y2=\"92\" opacity=\"0.4\"><\u002Fline>\n            <text class=\"schem-tag dim\" x=\"10\" y=\"104\">three counters · graceful exit<\u002Ftext>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <p class=\"tg-body\">Three independent counters watch the run. <code>zero_progress<\u002Fcode> trips when nothing has advanced in 5 rounds. <code>time<\u002Fcode> trips at 10 hours. <code>failures<\u002Fcode> trips when the same ticket keeps blowing up. Any one of them ends the run cleanly — saves state, writes the report, exits — instead of churning until your wallet or your repo notices.<\u002Fp>\n        <div class=\"tg-cap\">three circuit breakers · zero-progress · time · watchdog<\u002Fdiv>\n      <\u002Farticle>\n\n      <!-- FIG 4 — Climbs when stuck. (Now with the calm-stop terminus —\n           the old FIG 9 folded in: ladder ends in either a brain decision\n           or, if even the brain can't triage, a PAUSED · NEEDS HUMAN stamp.) -->\n      <article class=\"tg-card\" data-fig=\"fig 4\" data-active=\"0\">\n        <h4>Climbs when stuck — <em>stops calmly when it can't.<\u002Fem><\u002Fh4>\n        <div class=\"tg-frame\">\n          <svg viewBox=\"0 0 260 140\" preserveAspectRatio=\"xMidYMid meet\" class=\"tg-fig-climb\" aria-hidden=\"true\">\n            <!-- Vertical ladder centered-left. Each rung is a model-tier\n                 with TWO labels: the action (retry / escalate / brain)\n                 right of the ladder, and the model name (sonnet / opus /\n                 triage) further right. Generous horizontal spacing so\n                 nothing overlaps. -->\n\n            <!-- caption (top) -->\n            <text class=\"schem-cap\" x=\"130\" y=\"14\" text-anchor=\"middle\">model ladder<\u002Ftext>\n\n            <!-- ladder rails -->\n            <line class=\"schem-line\" x1=\"34\" y1=\"28\" x2=\"34\" y2=\"106\"><\u002Fline>\n            <line class=\"schem-line\" x1=\"58\" y1=\"28\" x2=\"58\" y2=\"106\"><\u002Fline>\n\n            <!-- rungs (4 of them, evenly spaced y=98,80,62,44) -->\n            <line class=\"schem-line rung-1\" x1=\"34\" y1=\"98\" x2=\"58\" y2=\"98\" stroke-width=\"1.4\"><\u002Fline>\n            <line class=\"schem-line rung-2\" x1=\"34\" y1=\"80\" x2=\"58\" y2=\"80\" stroke-width=\"1.4\"><\u002Fline>\n            <line class=\"schem-line rung-3 solid-blue\" x1=\"34\" y1=\"62\" x2=\"58\" y2=\"62\" stroke-width=\"1.4\"><\u002Fline>\n            <line class=\"schem-line ochre\" x1=\"34\" y1=\"44\" x2=\"58\" y2=\"44\" stroke-width=\"1.4\"><\u002Fline>\n\n            <!-- per-rung labels: action @ x=66, model @ x=124 -->\n            <text class=\"schem-tag\" x=\"66\" y=\"100\">retry<\u002Ftext>\n            <text class=\"schem-tag dim\" x=\"124\" y=\"100\">sonnet<\u002Ftext>\n\n            <text class=\"schem-tag\" x=\"66\" y=\"82\">retry<\u002Ftext>\n            <text class=\"schem-tag dim\" x=\"124\" y=\"82\">sonnet<\u002Ftext>\n\n            <text class=\"schem-tag blue\" x=\"66\" y=\"64\">escalate<\u002Ftext>\n            <text class=\"schem-tag dim\" x=\"124\" y=\"64\">opus<\u002Ftext>\n\n            <text class=\"schem-tag ochre\" x=\"66\" y=\"46\">brain<\u002Ftext>\n            <text class=\"schem-tag dim\" x=\"124\" y=\"46\">triage<\u002Ftext>\n\n            <!-- climbing ping (cy values match rung positions) -->\n            <circle class=\"ping schem-dot ochre\" cx=\"46\" cy=\"98\" r=\"3.5\">\n              <animate attributeName=\"cy\" values=\"98; 98; 80; 80; 62; 62; 44; 44\" keyTimes=\"0; 0.12; 0.26; 0.40; 0.50; 0.64; 0.74; 1\" dur=\"8s\" repeatCount=\"indefinite\"><\u002Fanimate>\n              <animate attributeName=\"opacity\" values=\"0; 1; 1; 0\" keyTimes=\"0; 0.06; 0.86; 1\" dur=\"8s\" repeatCount=\"indefinite\"><\u002Fanimate>\n            <\u002Fcircle>\n\n            <!-- terminus arrow: from brain rung tip → out to PAUSED stamp.\n                 Only appears once the ping reaches brain and the PAUSED\n                 verdict is rendered — otherwise it leaks the ending. -->\n            <line class=\"schem-line dashed ochre\" x1=\"158\" y1=\"46\" x2=\"186\" y2=\"46\" opacity=\"0\">\n              <animate attributeName=\"opacity\" values=\"0; 0; 0; 0.6; 0.6\" keyTimes=\"0; 0.74; 0.80; 0.86; 1\" dur=\"8s\" repeatCount=\"indefinite\"><\u002Fanimate>\n            <\u002Fline>\n            <polygon points=\"186,46 182,43.5 182,48.5\" fill=\"var(--ochre)\" opacity=\"0\">\n              <animate attributeName=\"opacity\" values=\"0; 0; 0; 0.7; 0.7\" keyTimes=\"0; 0.74; 0.80; 0.86; 1\" dur=\"8s\" repeatCount=\"indefinite\"><\u002Fanimate>\n            <\u002Fpolygon>\n\n            <!-- PAUSED · NEEDS HUMAN stamp on the right -->\n            <g class=\"paused-stamp\" style=\"opacity:0\">\n              <animate attributeName=\"opacity\" values=\"0; 0; 0; 1; 1\" keyTimes=\"0; 0.74; 0.80; 0.86; 1\" dur=\"8s\" repeatCount=\"indefinite\"><\u002Fanimate>\n              <g transform=\"translate(190 36) rotate(-5)\">\n                <rect class=\"schem-stamp-box\" x=\"0\" y=\"0\" width=\"64\" height=\"20\" rx=\"1\"><\u002Frect>\n                <text class=\"schem-stamp-text\" x=\"32\" y=\"9\" text-anchor=\"middle\" style=\"font-size:6px\">PAUSED<\u002Ftext>\n                <text class=\"schem-stamp-text\" x=\"32\" y=\"17\" text-anchor=\"middle\" style=\"font-size:6px\">NEEDS HUMAN<\u002Ftext>\n              <\u002Fg>\n            <\u002Fg>\n\n            <!-- subtle file annotation under the stamp, fades in with it -->\n            <text class=\"schem-tag dim paused-stamp\" x=\"222\" y=\"70\" text-anchor=\"middle\" style=\"opacity:0; font-size:6.5px\">\n              <animate attributeName=\"opacity\" values=\"0;0;0;1;1\" keyTimes=\"0;0.74;0.80;0.86;1\" dur=\"8s\" repeatCount=\"indefinite\"><\u002Fanimate>\n              ./deferred/&lt;ticket&gt;.md\n            <\u002Ftext>\n\n            <!-- bottom rule + caption -->\n            <line class=\"schem-line\" x1=\"14\" y1=\"118\" x2=\"246\" y2=\"118\" opacity=\"0.3\"><\u002Fline>\n            <text class=\"schem-cap\" x=\"130\" y=\"130\" text-anchor=\"middle\">three rungs · one judge · calm pause<\u002Ftext>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <p class=\"tg-body\">Failed gates don't loop blindly. The first retry runs on the same model. The next escalates to <code>opus<\u002Fcode>. If that still doesn't pass, a separate brain agent reads the failure and decides what to do — <code>SKIP<\u002Fcode>, <code>DEFER<\u002Fcode>, or continue. And when even the brain can't decide cleanly, the harness doesn't guess: it writes <code>./deferred/&lt;ticket&gt;.md<\u002Fcode> with exactly what it tried and what it needs from you, then carries on with the rest of the queue. Three rungs, a judge, and one calm exit — never infinite re-rolls, never a 3am crash.<\u002Fp>\n        <div class=\"tg-cap\">retry → escalate → triage → calm pause<\u002Fdiv>\n      <\u002Farticle>\n\n      <!-- FIG 5 — Stays in its lane. -->\n      <article class=\"tg-card\" data-fig=\"fig 5\" data-active=\"0\">\n        <h4>Stays in its lane.<\u002Fh4>\n        <div class=\"tg-frame\">\n          <svg viewBox=\"0 0 220 120\" preserveAspectRatio=\"xMidYMid meet\" class=\"tg-fig-fence\" aria-hidden=\"true\">\n            <!-- hatched perimeter pattern -->\n            <defs>\n              <pattern id=\"hatch-fence\" patternUnits=\"userSpaceOnUse\" width=\"4\" height=\"4\" patternTransform=\"rotate(45)\">\n                <line x1=\"0\" y1=\"0\" x2=\"0\" y2=\"4\" stroke=\"var(--ink-30)\" stroke-width=\"0.5\"><\u002Fline>\n              <\u002Fpattern>\n            <\u002Fdefs>\n\n            <!-- fence (paper inside, hatched border feel) -->\n            <rect x=\"44\" y=\"22\" width=\"112\" height=\"64\" fill=\"url(#hatch-fence)\" opacity=\"0.4\"><\u002Frect>\n            <rect class=\"schem-rect tight\" x=\"44\" y=\"22\" width=\"112\" height=\"64\" rx=\"1\"><\u002Frect>\n            <text class=\"schem-tag blue\" x=\"50\" y=\"34\">worktree · sandbox<\u002Ftext>\n\n            <!-- agent dot rattling inside -->\n            <g class=\"agent\">\n              <circle class=\"schem-dot blue\" cx=\"86\" cy=\"58\" r=\"3\"><\u002Fcircle>\n              <text class=\"schem-tag blue\" x=\"92\" y=\"60\">agent<\u002Ftext>\n            <\u002Fg>\n\n            <!-- outside labels (greyed). Each label gets a short, consistent\n                 tick mark (16px wide) at its outer edge — pointing OUTWARD\n                 from the fence. Same length on all four corners so the\n                 fence reads as a clean rectangle of constraints. -->\n            <text class=\"schem-tag dim\" x=\"6\" y=\"16\">other repos<\u002Ftext>\n            <line class=\"schem-line dashed\" x1=\"6\" y1=\"20\" x2=\"22\" y2=\"20\" opacity=\"0.5\"><\u002Fline>\n\n            <text class=\"schem-tag dim\" x=\"214\" y=\"16\" text-anchor=\"end\">main<\u002Ftext>\n            <line class=\"schem-line dashed\" x1=\"198\" y1=\"20\" x2=\"214\" y2=\"20\" opacity=\"0.5\"><\u002Fline>\n\n            <text class=\"schem-tag dim\" x=\"6\" y=\"100\">network<\u002Ftext>\n            <line class=\"schem-line dashed\" x1=\"6\" y1=\"104\" x2=\"22\" y2=\"104\" opacity=\"0.5\"><\u002Fline>\n\n            <text class=\"schem-tag dim\" x=\"214\" y=\"100\" text-anchor=\"end\">packed-refs<\u002Ftext>\n            <line class=\"schem-line dashed\" x1=\"198\" y1=\"104\" x2=\"214\" y2=\"104\" opacity=\"0.5\"><\u002Fline>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <p class=\"tg-body\">Each ticket runs in its own git worktree on its own branch. The agent can’t reach <code>main<\u002Fcode>, can’t touch packed-refs, can’t read other repos, and has its tool list pinned ahead of time. The fence is enforced at the seatbelt layer, not asked-for politely — the agent literally cannot do the things outside it.<\u002Fp>\n        <div class=\"tg-cap\">sandboxed by design · seatbelt-enforced<\u002Fdiv>\n      <\u002Farticle>\n\n      <!-- FIG 6 — Coordinates upstream, heals what's left.\n           TOP: scheduler buckets tickets into rounds (R1,R2,R3) by file\n           overlap, so tickets in the same round don't touch each other.\n           BOTTOM: the rare cross-round conflict still gets the graded\n           heal (trivial fast-path / one bounded repair / defer). -->\n      <article class=\"tg-card\" data-fig=\"fig 6\" data-active=\"0\">\n        <h4>Schedules around conflicts. <em>Heals what slips through.<\u002Fem><\u002Fh4>\n        <div class=\"tg-frame\">\n          <svg viewBox=\"0 0 240 130\" preserveAspectRatio=\"xMidYMid meet\" class=\"tg-fig-merge\" aria-hidden=\"true\">\n            <!-- ─── TOP: round scheduler ─── -->\n            <text class=\"schem-cap\" x=\"120\" y=\"12\" text-anchor=\"middle\">file-overlap scheduler<\u002Ftext>\n\n            <!-- 5 incoming tickets fan into 3 round buckets -->\n            <!-- ticket pool on the left -->\n            <g>\n              <rect class=\"schem-rect\" x=\"6\" y=\"22\" width=\"22\" height=\"9\" rx=\"1\"><\u002Frect>\n              <rect class=\"schem-rect\" x=\"6\" y=\"34\" width=\"22\" height=\"9\" rx=\"1\"><\u002Frect>\n              <rect class=\"schem-rect\" x=\"6\" y=\"46\" width=\"22\" height=\"9\" rx=\"1\"><\u002Frect>\n              <rect class=\"schem-rect\" x=\"6\" y=\"58\" width=\"22\" height=\"9\" rx=\"1\"><\u002Frect>\n              <rect class=\"schem-rect\" x=\"6\" y=\"70\" width=\"22\" height=\"9\" rx=\"1\"><\u002Frect>\n              <text class=\"schem-tag dim\" x=\"17\" y=\"29\" text-anchor=\"middle\" style=\"font-size:5.5px\">a<\u002Ftext>\n              <text class=\"schem-tag dim\" x=\"17\" y=\"41\" text-anchor=\"middle\" style=\"font-size:5.5px\">b<\u002Ftext>\n              <text class=\"schem-tag dim\" x=\"17\" y=\"53\" text-anchor=\"middle\" style=\"font-size:5.5px\">c<\u002Ftext>\n              <text class=\"schem-tag dim\" x=\"17\" y=\"65\" text-anchor=\"middle\" style=\"font-size:5.5px\">d<\u002Ftext>\n              <text class=\"schem-tag dim\" x=\"17\" y=\"77\" text-anchor=\"middle\" style=\"font-size:5.5px\">e<\u002Ftext>\n            <\u002Fg>\n            <text class=\"schem-tag dim\" x=\"6\" y=\"92\">5 tickets<\u002Ftext>\n\n            <!-- routing lines: a,c → R1 ; b,d → R2 ; e → R3 -->\n            <line class=\"schem-line solid-blue branch-flow\" x1=\"28\" y1=\"27\" x2=\"78\" y2=\"32\"><\u002Fline>\n            <line class=\"schem-line solid-blue branch-flow\" x1=\"28\" y1=\"51\" x2=\"78\" y2=\"40\"><\u002Fline>\n            <line class=\"schem-line solid-blue branch-flow\" x1=\"28\" y1=\"39\" x2=\"78\" y2=\"56\"><\u002Fline>\n            <line class=\"schem-line solid-blue branch-flow\" x1=\"28\" y1=\"63\" x2=\"78\" y2=\"64\"><\u002Fline>\n            <line class=\"schem-line solid-blue branch-flow\" x1=\"28\" y1=\"75\" x2=\"78\" y2=\"84\"><\u002Fline>\n\n            <!-- 3 round buckets -->\n            <g>\n              <rect class=\"schem-rect tight\" x=\"78\" y=\"24\" width=\"56\" height=\"20\" rx=\"1\"><\u002Frect>\n              <text class=\"schem-cap blue\" x=\"106\" y=\"36\" text-anchor=\"middle\" style=\"font-size:6px\">R1 · a, c<\u002Ftext>\n            <\u002Fg>\n            <g>\n              <rect class=\"schem-rect tight\" x=\"78\" y=\"48\" width=\"56\" height=\"20\" rx=\"1\"><\u002Frect>\n              <text class=\"schem-cap blue\" x=\"106\" y=\"60\" text-anchor=\"middle\" style=\"font-size:6px\">R2 · b, d<\u002Ftext>\n            <\u002Fg>\n            <g>\n              <rect class=\"schem-rect tight\" x=\"78\" y=\"72\" width=\"56\" height=\"20\" rx=\"1\"><\u002Frect>\n              <text class=\"schem-cap blue\" x=\"106\" y=\"84\" text-anchor=\"middle\" style=\"font-size:6px\">R3 · e<\u002Ftext>\n            <\u002Fg>\n\n            <!-- annotation on the right of buckets -->\n            <text class=\"schem-tag dim\" x=\"140\" y=\"36\">no shared files<\u002Ftext>\n            <text class=\"schem-tag dim\" x=\"140\" y=\"60\">no shared files<\u002Ftext>\n            <text class=\"schem-tag dim\" x=\"140\" y=\"84\">depends on a<\u002Ftext>\n\n            <!-- ─── BOTTOM: graded heal for the rare slip-through ─── -->\n            <line class=\"schem-line\" x1=\"6\" y1=\"100\" x2=\"234\" y2=\"100\" opacity=\"0.25\"><\u002Fline>\n            <text class=\"schem-cap\" x=\"120\" y=\"112\" text-anchor=\"middle\">when conflicts still happen<\u002Ftext>\n\n            <!-- two outcomes side-by-side, no merge geometry -->\n            <g>\n              <rect class=\"schem-stamp-box\" x=\"36\" y=\"116\" width=\"64\" height=\"11\" rx=\"1\" style=\"stroke:var(--blue)\"><\u002Frect>\n              <text class=\"schem-stamp-text\" x=\"68\" y=\"124\" text-anchor=\"middle\" style=\"fill:var(--blue); font-size:6.5px\">✓ TRIVIAL<\u002Ftext>\n            <\u002Fg>\n            <g>\n              <rect class=\"schem-stamp-box\" x=\"140\" y=\"116\" width=\"64\" height=\"11\" rx=\"1\"><\u002Frect>\n              <text class=\"schem-stamp-text\" x=\"172\" y=\"124\" text-anchor=\"middle\" style=\"font-size:6.5px\">REPAIR · 1×<\u002Ftext>\n            <\u002Fg>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <p class=\"tg-body\">Conflicts are mostly prevented before they happen. <code>/overnight<\u002Fcode> reads each ticket's file list and groups tickets into rounds so no two tickets in the same round touch the same file — and dependencies wait for their predecessors to finish. When a conflict still slips through, the harness uses a graded heal: trivial conflicts (whitespace, imports, non-overlapping hunks) take a fast-path stamp; real conflicts get exactly one bounded repair attempt, then defer. No infinite repair loops, no surprise force-pushes.<\u002Fp>\n        <div class=\"tg-cap\">round scheduler · graded heal<\u002Fdiv>\n      <\u002Farticle>\n\n      <!-- FIG 7 — Survives interruption. -->\n      <article class=\"tg-card\" data-fig=\"fig 7\" data-active=\"0\">\n        <h4>Survives interruption.<\u002Fh4>\n        <div class=\"tg-frame\">\n          <svg viewBox=\"0 0 240 120\" preserveAspectRatio=\"xMidYMid meet\" class=\"tg-fig-resume\" aria-hidden=\"true\">\n            <!-- clock face -->\n            <circle class=\"schem-rect\" cx=\"64\" cy=\"56\" r=\"28\" fill=\"var(--paper)\"><\u002Fcircle>\n            <!-- tick marks -->\n            <line class=\"schem-line\" x1=\"64\" y1=\"32\" x2=\"64\" y2=\"36\"><\u002Fline>\n            <line class=\"schem-line\" x1=\"64\" y1=\"76\" x2=\"64\" y2=\"80\"><\u002Fline>\n            <line class=\"schem-line\" x1=\"40\" y1=\"56\" x2=\"44\" y2=\"56\"><\u002Fline>\n            <line class=\"schem-line\" x1=\"84\" y1=\"56\" x2=\"88\" y2=\"56\"><\u002Fline>\n            <!-- center pivot -->\n            <circle class=\"schem-dot\" cx=\"64\" cy=\"56\" r=\"1.5\"><\u002Fcircle>\n            <!-- sweep hand (animated) -->\n            <line class=\"sweep schem-line solid-blue\" x1=\"64\" y1=\"56\" x2=\"64\" y2=\"36\" stroke-width=\"1.5\"><\u002Fline>\n\n            <!-- lid that closes over the clock -->\n            <rect class=\"lid\" x=\"34\" y=\"26\" width=\"60\" height=\"60\" fill=\"var(--ink)\" opacity=\"0.85\"><\u002Frect>\n\n            <!-- to the right: persistent state file with checkpoint.\n                 Rect spans x=144..236 (92 wide) so the longest line\n                 (`progress: 4 / 9`) clears the right edge. -->\n            <rect class=\"schem-rect\" x=\"144\" y=\"32\" width=\"92\" height=\"48\" rx=\"1\"><\u002Frect>\n            <text class=\"schem-cap\" x=\"190\" y=\"28\" text-anchor=\"middle\">overnight-state<\u002Ftext>\n            <line class=\"schem-line dashed\" x1=\"150\" y1=\"44\" x2=\"230\" y2=\"44\" opacity=\"0.5\"><\u002Fline>\n            <text class=\"schem-tag\" x=\"150\" y=\"56\">phase: implement<\u002Ftext>\n            <text class=\"schem-tag\" x=\"150\" y=\"66\">progress: 4 / 9<\u002Ftext>\n            <text class=\"schem-tag blue\" x=\"150\" y=\"76\">checkpoint ✓<\u002Ftext>\n\n            <!-- arrow back from state to clock (resumes from disk) -->\n            <line class=\"schem-line solid-blue\" x1=\"144\" y1=\"56\" x2=\"94\" y2=\"56\"><\u002Fline>\n            <polygon points=\"94,56 99,53 99,59\" fill=\"var(--blue)\"><\u002Fpolygon>\n\n            <text class=\"schem-cap\" x=\"100\" y=\"108\" text-anchor=\"middle\">interrupt → reconcile<\u002Ftext>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <p class=\"tg-body\">Every phase transition writes <code>overnight-state.json<\u002Fcode> atomically before continuing. Close your laptop mid-run, lose power, kill the process — on restart, <code>interrupt.py<\u002Fcode> reads the last checkpoint, reconciles any half-finished branch, and resumes from exactly where it left off. No double-merges, no orphaned worktrees, no lost work.<\u002Fp>\n        <div class=\"tg-cap\">atomic state · resumes cleanly<\u002Fdiv>\n      <\u002Farticle>\n\n      <!-- FIG 8 — Tells you everything it did. -->\n      <article class=\"tg-card\" data-fig=\"fig 8\" data-active=\"0\">\n        <h4>Tells you everything it did.<\u002Fh4>\n        <div class=\"tg-frame\">\n          <svg viewBox=\"0 0 240 120\" preserveAspectRatio=\"xMidYMid meet\" class=\"tg-fig-report\" aria-hidden=\"true\">\n            <!-- 5 log streams flowing right into the morning report.\n                 Labels live x=6..~62; streams start at x=72 so no overlap. -->\n            <text class=\"schem-tag dim\" x=\"6\" y=\"20\">phase.jsonl<\u002Ftext>\n            <line class=\"schem-line stream s1\" x1=\"72\" y1=\"18\" x2=\"160\" y2=\"44\"><\u002Fline>\n\n            <text class=\"schem-tag dim\" x=\"6\" y=\"38\">spawn.jsonl<\u002Ftext>\n            <line class=\"schem-line stream s2\" x1=\"72\" y1=\"36\" x2=\"160\" y2=\"50\"><\u002Fline>\n\n            <text class=\"schem-tag dim\" x=\"6\" y=\"56\">retry.jsonl<\u002Ftext>\n            <line class=\"schem-line stream s3\" x1=\"72\" y1=\"54\" x2=\"160\" y2=\"56\"><\u002Fline>\n\n            <text class=\"schem-tag dim\" x=\"6\" y=\"74\">conflict.jsonl<\u002Ftext>\n            <line class=\"schem-line stream s4\" x1=\"72\" y1=\"72\" x2=\"160\" y2=\"62\"><\u002Fline>\n\n            <text class=\"schem-tag dim\" x=\"6\" y=\"92\">brain.jsonl<\u002Ftext>\n            <line class=\"schem-line stream s5\" x1=\"72\" y1=\"90\" x2=\"160\" y2=\"68\"><\u002Fline>\n\n            <!-- the morning-report document on the right -->\n            <rect class=\"schem-rect tight\" x=\"160\" y=\"32\" width=\"60\" height=\"48\" rx=\"1\"><\u002Frect>\n            <text class=\"schem-cap blue\" x=\"190\" y=\"28\" text-anchor=\"middle\">MORNING_REPORT.MD<\u002Ftext>\n            <!-- dummy lines on the doc -->\n            <line class=\"schem-line dashed\" x1=\"164\" y1=\"42\" x2=\"216\" y2=\"42\" opacity=\"0.6\"><\u002Fline>\n            <line class=\"schem-line dashed\" x1=\"164\" y1=\"50\" x2=\"210\" y2=\"50\" opacity=\"0.4\"><\u002Fline>\n            <line class=\"schem-line dashed\" x1=\"164\" y1=\"58\" x2=\"214\" y2=\"58\" opacity=\"0.4\"><\u002Fline>\n            <line class=\"schem-line dashed\" x1=\"164\" y1=\"66\" x2=\"204\" y2=\"66\" opacity=\"0.4\"><\u002Fline>\n            <line class=\"schem-line dashed\" x1=\"164\" y1=\"74\" x2=\"212\" y2=\"74\" opacity=\"0.4\"><\u002Fline>\n\n            <text class=\"schem-cap\" x=\"120\" y=\"108\" text-anchor=\"middle\">five logs → one report<\u002Ftext>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <p class=\"tg-body\">Five JSONL streams record everything during the run: phase transitions, agent spawns, retries, conflicts, and brain triage decisions. At dawn they’re collated into a single <code>morning-report.md<\u002Fcode> — what merged, what was skipped and why, what’s waiting for you. Every decision is auditable; nothing happens off the record.<\u002Fp>\n        <div class=\"tg-cap\">five logs · one report · full audit<\u002Fdiv>\n      <\u002Farticle>\n\n    <\u002Fdiv>\nules around conflicts · survives interruption · tells you everything it did. That's the harness. Everything else — MCP plumbing, JSONL schemas, model matrix — is plumbing. These are the things that decide whether you sleep.<p><\u002Fp>\n  <\u002Fsection>\n\n  <script>\n  /* Trust grid: only animate cards while they're on screen. Saves\n     battery and keeps non-visible animations from competing for paint. */\n  (function(){\n    var cards = document.querySelectorAll('.trust-grid .tg-card');\n    if (!cards.length || !('IntersectionObserver' in window)) {\n      cards.forEach(function(c){ c.setAttribute('data-active','1'); });\n      return;\n    }\n    var io = new IntersectionObserver(function(entries){\n      entries.forEach(function(e){\n        e.target.setAttribute('data-active', e.isIntersecting ? '1' : '0');\n      });\n    }, { threshold: 0.15 });\n    cards.forEach(function(c){ io.observe(c); });\n  })();\n  <\u002Fscript>\n\n  <!-- ───────── What ships ───────── -->\n  <section class=\"install\" id=\"install\">\n    <span class=\"redline\" style=\"top:8px; right:0;\">don't take the whole framework. take the part that fits your week.<\u002Fspan>\n    <div class=\"marker\">§06 · what ships · 3 surfaces, opt-in<\u002Fdiv>\n    <h2>Start with the skills. <em>Add overnight when you want autonomy.<\u002Fem><\u002Fh2>\n\n    <div class=\"ship-grid two-col\">\n      <article class=\"ship-card required\" data-surface=\"skills\">\n        <div class=\"ship-head\">\n          <span class=\"ship-num\">01<\u002Fspan>\n          <span class=\"ship-opt req\">required · start here<\u002Fspan>\n        <\u002Fdiv>\n        <h3 class=\"ship-name\">cortex-core<\u002Fh3>\n        <p class=\"ship-desc\">The interactive lifecycle — <code>/discovery<\u002Fcode>, <code>/refine<\u002Fcode>, <code>/critical-review<\u002Fcode>, <code>/lifecycle<\u002Fcode> — installed as a Claude Code plugin. <strong>Start here.<\u002Fstrong> Run <code>/lifecycle<\u002Fcode> on a real ticket to feel the gates — clarify, research, spec, plan, critical-review, implement, review — with you in the loop. The lowest-risk way to evaluate spec quality before adopting autonomy.<\u002Fp>\n        <p class=\"ship-when\"><span class=\"k\">install:<\u002Fspan> <code>/plugin install cortex-core@cortex-command<\u002Fcode><\u002Fp>\n      <\u002Farticle>\n\n      <article class=\"ship-card optional\" data-surface=\"overnight\">\n        <div class=\"ship-head\">\n          <span class=\"ship-num\">02<\u002Fspan>\n          <span class=\"ship-opt opt\">optional · auto-installs cli + mcp<\u002Fspan>\n        <\u002Fdiv>\n        <h3 class=\"ship-name\"><span class=\"ship-icon-moon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M19.5 14.5 A8 8 0 1 1 9.5 4.5 A6 6 0 0 0 19.5 14.5 Z\" fill=\"currentColor\" fill-opacity=\"0.18\"><\u002Fpath><circle cx=\"4.5\" cy=\"5.5\" r=\"0.6\" fill=\"currentColor\" stroke=\"none\"><\u002Fcircle><circle cx=\"20\" cy=\"19\" r=\"0.6\" fill=\"currentColor\" stroke=\"none\"><\u002Fcircle><circle cx=\"6.5\" cy=\"20\" r=\"0.5\" fill=\"currentColor\" stroke=\"none\"><\u002Fcircle><\u002Fsvg><\u002Fspan>cortex-overnight<\u002Fh3>\n        <p class=\"ship-desc\">The autonomous half. Installing the plugin auto-installs the <code>cortex<\u002Fcode> CLI (<code>cortex overnight<\u002Fcode> / <code>cortex morning-review<\u002Fcode>) and an MCP server (<code>read_spec<\u002Fcode>, <code>advance_phase<\u002Fcode>, <code>list_lifecycles<\u002Fcode>) so any MCP-speaking agent can read Cortex state. Skip it if you only want gated lifecycles in-session.<\u002Fp>\n        <p class=\"ship-when\"><span class=\"k\">install:<\u002Fspan> <code>/plugin install cortex-overnight@cortex-command<\u002Fcode> — only when you're ready to hand off work overnight.<\u002Fp>\n      <\u002Farticle>\n    <\u002Fdiv>\n\n    <div class=\"repo-line\">\n      <a class=\"install-cta\" href=\"https://github.com/charleshall888/cortex-command#install\" target=\"_blank\" rel=\"noopener\">install instructions →<\u002Fa>\n      <a href=\"https://github.com/charleshall888/cortex-command\" target=\"_blank\" rel=\"noopener\">github.com/charleshall888/cortex-command ↗<\u002Fa>\n      <span class=\"repo-meta\">MIT · v0.4 · plain markdown state · readable commands<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer id=\"page-footer\">\n    <div class=\"links\">\n      <a href=\"#\">github<\u002Fa>\n      <a href=\"#\">MIT license<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"author\">\n      Built by Charlie Hall.\n      <span class=\"author-aside\">Want an excellent espresso shot while you run /morning-review? Check out my AI Gaggimate project, gaggimate-barista.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fmain>\n\n<!-- Achievement toast (Spec Earned) -->\n<div class=\"toast\" id=\"toast-spec-earned\" role=\"status\" aria-live=\"polite\">\n  <div class=\"icon\">\n    <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\">\n      <path d=\"M5 4 H19 L17 12 A5 5 0 0 1 7 12 Z\"><\u002Fpath>\n      <path d=\"M9 18 H15 V21 H9 Z\"><\u002Fpath>\n      <path d=\"M5 4 V8 A2 2 0 0 0 7 10\"><\u002Fpath>\n      <path d=\"M19 4 V8 A2 2 0 0 1 17 10\"><\u002Fpath>\n    <\u002Fsvg>\n  <\u002Fdiv>\n  <div class=\"body\">\n    <div class=\"top\">Achievement<\u002Fdiv>\n    <div class=\"title\">Spec Earned<\u002Fdiv>\n    <div class=\"sub\">all four phases locked · ready for handoff<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Achievement toast (First Light, dawn) -->\n<div class=\"toast first-light\" id=\"toast-first-light\" role=\"status\" aria-live=\"polite\">\n  <div class=\"icon\">\n    <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\">\n      <circle cx=\"12\" cy=\"14\" r=\"4\"><\u002Fcircle>\n      <path d=\"M3 18 H21\"><\u002Fpath>\n      <path d=\"M12 4 V7\"><\u002Fpath>\n      <path d=\"M5 7 L7 9\"><\u002Fpath>\n      <path d=\"M19 7 L17 9\"><\u002Fpath>\n    <\u002Fsvg>\n  <\u002Fdiv>\n  <div class=\"body\">\n    <div class=\"top\">Achievement<\u002Fdiv>\n    <div class=\"title\">First Light<\u002Fdiv>\n    <div class=\"sub\">overnight run completed before you woke up.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Following ink cursor (v2 behaviors) -->\n<svg class=\"ink-follow\" id=\"ink-follow\" viewBox=\"0 0 14 18\" aria-hidden=\"true\">\n  <path d=\"M2 2 L2 14 L5 11 L7 16 L9 15 L7 10 L11 10 Z\" fill=\"currentColor\" stroke=\"currentColor\" stroke-width=\"0.6\" stroke-linejoin=\"round\"><\u002Fpath>\n<\u002Fsvg>\n\n<!-- Redline mode (Konami / ?mode=redlined) -->\n<div class=\"redline-banner\">\n  <span>↑↑↓↓←→←→ba · redlined spec mode · author's voice<\u002Fspan>\n  <button id=\"redline-exit\">exit<\u002Fbutton>\n<\u002Fdiv>\n\n<script>\n  // ─────────── Section lock + sidebar agents ───────────\n  const sections = Array.from(document.querySelectorAll('.sec'));\n  const headerCounter = document.querySelector('.stream-header span:last-child');\n  const toastSpec = document.getElementById('toast-spec-earned');\n  const toastDawn = document.getElementById('toast-first-light');\n  const inkFollow = document.getElementById('ink-follow');\n\n  let locked = new Set();\n  let toastShown = false;\n  let dawnShown = false;\n\n  function activateAgent(_phase) {\n    // (sidebar agents replaced by meta-spec; nothing to activate here)\n  }\n  function updateCounter() {\n    if (headerCounter) headerCounter.textContent = `4 gates · ${locked.size} of 4 cleared`;\n  }\n  function tryLock() {\n    const anchor = window.innerHeight * 0.55;\n    for (let i = 0; i < sections.length; i++) {\n      const sec = sections[i];\n      if (locked.has(i)) continue;\n      if (i > 0 && !locked.has(i - 1)) break;\n      const rect = sec.getBoundingClientRect();\n      if (rect.top < anchor + 80 && !sec.classList.contains('locking') && !sec.classList.contains('locked')) {\n        sec.classList.add('locking');\n      }\n      if (rect.top < anchor) {\n        sec.classList.remove('locking');\n        sec.classList.add('locked');\n        locked.add(i);\n        activateAgent(sec.dataset.phase);\n        updateCounter();\n        if (locked.size === 4 && !toastShown) {\n          toastShown = true;\n          setTimeout(() => toastSpec.classList.add('show'), 350);\n          setTimeout(() => toastSpec.classList.remove('show'), 6800);\n        }\n      }\n    }\n  }\n\n  // ─────────── Ink-cursor follow (eased lag, hides at section bounds) ───────────\n  let inkTarget = null; // {x, y} viewport coords\n  let inkPos = { x: -100, y: -100 };\n  function setInkTarget(x, y) { inkTarget = { x, y }; }\n  function clearInk() { inkTarget = null; inkFollow.classList.remove('visible'); }\n  function tickInk() {\n    if (inkTarget) {\n      inkPos.x += (inkTarget.x - inkPos.x) * 0.12;\n      inkPos.y += (inkTarget.y - inkPos.y) * 0.12;\n      inkFollow.style.transform = `translate3d(${inkPos.x}px, ${inkPos.y}px, 0)`;\n      inkFollow.classList.add('visible');\n    }\n    requestAnimationFrame(tickInk);\n  }\n  tickInk();\n\n  // While in spec stream: cursor follows the locking section's left margin\n  function updateInkOnSpec() {\n    const live = sections.find(s => s.classList.contains('locking'))\n              || sections.slice().reverse().find(s => s.classList.contains('locked'));\n    if (!live) return false;\n    const rect = live.getBoundingClientRect();\n    if (rect.bottom < 0 || rect.top > window.innerHeight) return false;\n    setInkTarget(rect.left + 14, Math.max(60, Math.min(window.innerHeight - 40, rect.top + 76)));\n    return true;\n  }\n\n  // ─────────── Pipeline section ───────────\n  const pipeWrap = document.getElementById('pipe-section');\n  const pipeStage = document.getElementById('pipe-stage');\n  const svg = document.getElementById('pipe-svg');\n  const tFill = document.getElementById('t-fill');\n  const tLabel = document.getElementById('t-label');\n  const tip = document.getElementById('pipe-tip');\n  const SVG = 'http://www.w3.org/2000/svg';\n\n  // Layout (in viewBox 1800x960)\n  const NODES = {\n    spec:    { x: 100,  y: 480, label: 'spec earned', sub: 'spec.md',\n               artifact: 'lifecycle/{slug}/spec.md', name: 'Locked spec' },\n    discov:  { x: 320,  y: 480, label: '/discovery', sub: 'fan-out',\n               artifact: 'lifecycle-research/{topic}/*.md',\n               name: '/discovery — map problem space' },\n    backlog: { x: 760,  y: 480, label: 'backlog · 5 tickets', sub: 'refined',\n               artifact: 'backlog/NNN-*.md',\n               name: 'Backlog · 5 refine tickets' },\n    refine:  { x: 940,  y: 480, label: '/refine', sub: 'per ticket',\n               artifact: 'lifecycle/{slug}/spec.md + research.md',\n               name: '/refine — clarify · research · spec' },\n    overnight:{x: 1440, y: 480, label: '/overnight', sub: 'parallel rails',\n               artifact: 'overnight-state.json',\n               name: '/overnight — autonomous parallel execution' },\n    morning: { x: 1700, y: 480, label: '/morning-review', sub: 'converge',\n               artifact: 'lifecycle/morning-report.md',\n               name: '/morning-review — close lifecycles, merge PRs' },\n  };\n  // Discovery branches (4) — match the 4 research bullets above\n  const DISC = [\n    { y: 290, label: 'Stardew Valley',     artifact: 'feedback loop ref' },\n    { y: 400, label: 'Sea of Thieves',     artifact: 'social-ritual ref' },\n    { y: 560, label: 'Dredge',             artifact: 'depth-as-risk ref' },\n    { y: 680, label: 'Real-world nightline', artifact: 'sleep-while-you-fish craft' },\n  ];\n  // Refine task rails (5) — match the 5 Plan tasks\n  const REFINE = [\n    { y: 220, label: 'tackle data model',  artifact: 'lifecycle/tackle/spec.md' },\n    { y: 340, label: 'cast/set screen',    artifact: 'lifecycle/cast-set/spec.md' },\n    { y: 480, label: 'overnight resolver', artifact: 'lifecycle/resolver/spec.md' },\n    { y: 620, label: 'dawn reveal anim',   artifact: 'lifecycle/dawn-reveal/spec.md' },\n    { y: 740, label: 'catch encyclopedia', artifact: 'lifecycle/encyclopedia/spec.md' },\n  ];\n\n  function el(tag, attrs={}) {\n    const n = document.createElementNS(SVG, tag);\n    for (const k in attrs) n.setAttribute(k, attrs[k]);\n    return n;\n  }\n\n  function buildPipe() {\n    svg.innerHTML = '';\n    // backdrop layer\n    const bg = el('g'); svg.appendChild(bg);\n    const railsLayer = el('g'); svg.appendChild(railsLayer);\n    const nodesLayer = el('g'); svg.appendChild(nodesLayer);\n    const trainsLayer = el('g'); svg.appendChild(trainsLayer);\n    const prLayer = el('g'); svg.appendChild(prLayer);\n\n    // Discovery fan-out: spec→discov→4 branches→backlog\n    DISC.forEach((d, i) => {\n      const p = el('path', {\n        class: 'rail disc-rail',\n        'data-i': i,\n        d: `M ${NODES.discov.x} ${NODES.discov.y} C ${NODES.discov.x+120} ${NODES.discov.y}, ${560} ${d.y}, ${680} ${d.y} L ${720} ${d.y} C ${740} ${d.y}, ${760} ${d.y}, ${NODES.backlog.x-30} ${(NODES.backlog.y+d.y)/2}`,\n      });\n      railsLayer.appendChild(p);\n    });\n\n    // Refine fan-out: refine→5 task rails→overnight\n    REFINE.forEach((r, i) => {\n      const p = el('path', {\n        class: 'rail ref-rail',\n        'data-i': i,\n        d: `M ${NODES.refine.x} ${NODES.refine.y} C ${NODES.refine.x+80} ${NODES.refine.y}, ${1080} ${r.y}, ${1180} ${r.y} L ${1320} ${r.y} C ${1360} ${r.y}, ${1400} ${r.y}, ${NODES.overnight.x} ${NODES.overnight.y}`,\n      });\n      railsLayer.appendChild(p);\n    });\n\n    // Spine rails\n    const spine = [\n      ['spec','discov'], ['backlog','refine'], ['overnight','morning'],\n    ];\n    spine.forEach(([a,b]) => {\n      const A = NODES[a], B = NODES[b];\n      const p = el('path', {\n        class: 'rail spine',\n        'data-from': a, 'data-to': b,\n        d: `M ${A.x} ${A.y} L ${B.x} ${B.y}`,\n      });\n      railsLayer.appendChild(p);\n    });\n\n    // Night rail (deep blue, ignites at ~32s)\n    const night = el('path', {\n      class: 'rail night-rail',\n      id: 'night-rail',\n      d: `M ${NODES.overnight.x-40} ${NODES.overnight.y+90} L ${NODES.morning.x+20} ${NODES.morning.y+90}`,\n    });\n    railsLayer.appendChild(night);\n\n    // Gold morning rail (converge at dawn)\n    const gold = el('path', {\n      class: 'rail gold',\n      id: 'gold-rail',\n      d: `M ${NODES.overnight.x+50} ${NODES.overnight.y} C ${NODES.overnight.x+150} ${NODES.overnight.y}, ${NODES.morning.x-150} ${NODES.morning.y}, ${NODES.morning.x-50} ${NODES.morning.y}`,\n      style: 'opacity:0',\n    });\n    railsLayer.appendChild(gold);\n\n    // Nodes\n    function makeNode(key, opts) {\n      const N = NODES[key];\n      const g = el('g', { class: 'node-g', 'data-key': key, transform: `translate(${N.x} ${N.y})` });\n      const c = el('circle', { class: 'node', cx: 0, cy: 0, r: opts && opts.r || 7 });\n      g.appendChild(c);\n      const lbl = el('text', { class: 'node-label', x: 0, y: -18, 'text-anchor': 'middle' });\n      lbl.textContent = N.label; g.appendChild(lbl);\n      const sub = el('text', { class: 'node-sub', x: 0, y: 28, 'text-anchor': 'middle' });\n      sub.textContent = N.sub; g.appendChild(sub);\n      g.addEventListener('mouseenter', (e) => showTip(N, g));\n      g.addEventListener('mouseleave', hideTip);\n      nodesLayer.appendChild(g);\n      return g;\n    }\n    Object.keys(NODES).forEach(k => makeNode(k, { r: k === 'backlog' ? 10 : 7 }));\n\n    // Branch labels (discovery refs)\n    DISC.forEach((d, i) => {\n      const t = el('text', {\n        class: 'node-label disc-label',\n        'data-i': i,\n        x: 620, y: d.y - 14, 'text-anchor': 'middle',\n      });\n      t.textContent = d.label;\n      nodesLayer.appendChild(t);\n    });\n    // Refine task labels\n    REFINE.forEach((r, i) => {\n      const t = el('text', {\n        class: 'node-label ref-label',\n        'data-i': i,\n        x: 1180, y: r.y - 14, 'text-anchor': 'start',\n      });\n      t.textContent = r.label;\n      nodesLayer.appendChild(t);\n    });\n\n    // Trains\n    function mkTrain(id, opts={}) {\n      const c = el('circle', { class: 'train' + (opts.gold ? ' gold' : ''), id, cx: 0, cy: 0, r: 4 });\n      trainsLayer.appendChild(c);\n      return c;\n    }\n    DISC.forEach((d,i) => mkTrain('disc-train-'+i));\n    REFINE.forEach((r,i) => mkTrain('ref-train-'+i));\n    mkTrain('night-train', { });\n    mkTrain('gold-train', { gold: true });\n\n    // PR badges (one per refine task)\n    REFINE.forEach((r, i) => {\n      const g = el('g', { class: 'pr-g', 'data-i': i, transform: `translate(${NODES.overnight.x} ${r.y})`, style: 'opacity:0' });\n      const rect = el('rect', { class: 'pr-badge', x: -22, y: -10, width: 44, height: 20 });\n      const tx = el('text', { class: 'node-sub', x: 0, y: 4, 'text-anchor': 'middle' });\n      tx.textContent = 'PR ' + (i+1);\n      g.appendChild(rect); g.appendChild(tx);\n      prLayer.appendChild(g);\n    });\n  }\n\n  buildPipe();\n\n  function showTip(N, g) {\n    const stageRect = pipeStage.getBoundingClientRect();\n    const gBox = g.getBoundingClientRect();\n    tip.querySelector('.name').textContent = N.name;\n    tip.querySelector('.path').textContent = N.artifact;\n    const x = gBox.left + gBox.width/2 - stageRect.left + 14;\n    const y = gBox.top - stageRect.top - 14;\n    tip.style.left = x + 'px';\n    tip.style.top = y + 'px';\n    tip.classList.add('show');\n  }\n  function hideTip() { tip.classList.remove('show'); }\n\n  // Pathfinder for trains\n  function pointOn(pathSelector, t) {\n    const p = svg.querySelector(pathSelector);\n    if (!p) return null;\n    const len = p.getTotalLength();\n    return p.getPointAtLength(t * len);\n  }\n\n  // Drive everything from scrollProgress 0..1 across pipeWrap\n  function pipeProgress() {\n    const r = pipeWrap.getBoundingClientRect();\n    const total = pipeWrap.offsetHeight - window.innerHeight;\n    const scrolled = Math.max(0, -r.top);\n    return Math.max(0, Math.min(1, scrolled / total));\n  }\n\n  function applyPipe(p) {\n    // Phases:\n    // 0.00 - 0.10 : draw rails (spine)\n    // 0.10 - 0.30 : discovery trains\n    // 0.30 - 0.50 : refine trains\n    // 0.50 - 0.72 : day → night, night-rail ignites, PR badges travel\n    // 0.72 - 0.90 : dawn re-saturate, gold rail converges\n    // 0.90 - 1.00 : settled poster\n\n    // Draw spine\n    const drawn = p > 0.04;\n    svg.querySelectorAll('.rail.spine').forEach(r => r.classList.toggle('drawn', drawn));\n\n    // Discovery rails draw + activate\n    DISC.forEach((d,i) => {\n      const rail = svg.querySelector(`.disc-rail[data-i=\"${i}\"]`);\n      if (rail) {\n        rail.classList.toggle('drawn', p > 0.06 + i*0.01);\n        rail.classList.toggle('active', p > 0.10 && p < 0.55);\n      }\n    });\n    // Discovery trains travel rail 0..1 between p=0.10 and p=0. sticky-scrub run — this keeps the window of\n        // invisibility short and predictable.\n        _sidebarEl.classList.toggle('pipe-active', e.intersectionRatio > 0.2);\n      });\n    }, { threshold: [0, 0.1, 0.2, 0.5, 0.8, 1] });\n    _io.observe(_pipeSection);\n  }\n\n  // ─────────── Redline mode ───────────\n  function setRedlined(on) {\n    document.body.classList.toggle('redlined', on);\n    if (on) {\n      const url = new URL(window.location);\n      url.searchParams.set('mode', 'redlined');\n      history.replaceState({}, '', url);\n    } else {\n      const url = new URL(window.location);\n      url.searchParams.delete('mode');\n      history.replaceState({}, '', url);\n    }\n  }\n  // URL fragment fallback\n  if (new URLSearchParams(window.location.search).get('mode') === 'redlined') setRedlined(true);\n  document.getElementById('redline-exit').addEventListener('click', () => setRedlined(false));\n\n  // Konami: ↑↑↓↓←→←→ba\n  const KONAMI = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];\n  let kPos = 0;\n  window.addEventListener('keydown', (e) => {\n    const key = e.key.length === 1 ? e.key.toLowerCase() : e.key;\n    if (key === KONAMI[kPos]) {\n      kPos++;\n      if (kPos === KONAMI.length) { setRedlined(true); kPos = 0; }\n    } else { kPos = (key === KONAMI[0]) ? 1 : 0; }\n  });\n\n  // ─────────── Meta-spec sidebar (this page, as a spec) ───────────\n  const msGates = Array.from(document.querySelectorAll('#ms-gates li'));\n  const msFill = document.getElementById('ms-progress-fill');\n  const msStatus = document.getElementById('ms-status');\n  const msTargets = msGates.map(g => ({ li: g, el: document.getElementById(g.dataset.section) })).filter(t => t.el);\n\n  function updateMetaSpec() {\n    const anchor = window.innerHeight * 0.45;\n    const footer = document.getElementById('page-footer');\n    let cleared = 0;\n    let activeIdx = -1;\n    for (let i = 0; i < msTargets.length; i++) {\n      const { li, el } = msTargets[i];\n      const r = el.getBoundingClientRect();\n      // Last gate (ship/install) uses the footer as its clear sentinel — install is taller\n      // than the viewport so its own bottom never crosses the anchor.\n      const isLast = (i === msTargets.length - 1);\n      let isCleared, isActive;\n      if (isLast) {\n        const fr = footer ? footer.getBoundingClientRect() : null;\n        // Footer is short — clear once it's visible at all (you've finished reading).\n        isCleared = fr ? fr.top < window.innerHeight : false;\n        isActive = !isCleared && r.top < anchor;\n      } else {\n        isCleared = r.bottom < anchor;\n        isActive = !isCleared && r.top < anchor;\n      }\n      li.classList.toggle('cleared', isCleared);\n      li.classList.toggle('active', isActive);\n      if (isCleared) cleared++;\n      if (isActive && activeIdx === -1) activeIdx = i;\n    }\n    if (msFill) msFill.style.width = `${(cleared / msTargets.length) * 100}%`;\n    if (msStatus) {\n      if (cleared === msTargets.length) {\n        msStatus.textContent = 'spec shipped · 6 of 6 cleared';\n        msStatus.classList.add('shipped');\n      } else if (activeIdx >= 0) {\n        const phase = msTargets[activeIdx].li.querySelector('.ms-name').textContent;\n        msStatus.textContent = `${phase} · ${cleared} of 6 cleared`;\n        msStatus.classList.remove('shipped');\n      } else if (cleared === 0) {\n        msStatus.textContent = 'spec drafting · 0 of 6 cleared';\n        msStatus.classList.remove('shipped');\n      } else {\n        msStatus.textContent = `between gates · ${cleared} of 6 cleared`;\n        msStatus.classList.remove('shipped');\n      }\n    }\n  }\n\n  // ─────────── Master scroll loop ───────────\n  let raf = null;\n  function frame() {\n    raf = null;\n    tryLock();\n    applyPipe(pipeProgress());\n    updateMetaSpec();\n  }\n  function onScroll() { if (!raf) raf = requestAnimationFrame(frame); }\n  window.addEventListener('scroll', onScroll, { passive: true });\n  window.addEventListener('resize', () => { checkCompact(); frame(); });\n  checkCompact();\n  frame();\n<\u002Fscript>\n\n<!-- ───────── Tweaks panel ───────── -->\n<div class=\"tweaks-panel\" id=\"tweaks-panel\" role=\"dialog\" aria-label=\"Tweaks\">\n  <div class=\"tw-head\">\n    <span class=\"tw-title\">Tweaks<\u002Fspan>\n    <span class=\"tw-stamp\">draft · v0.4<\u002Fspan>\n    <button class=\"tw-close\" id=\"tw-close\" aria-label=\"Close\">×<\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"tw-body\">\n    <div class=\"tw-group\" data-key=\"manuscript\">\n      <div class=\"tw-label\">Manuscript<\u002Fdiv>\n      <div class=\"tw-name\" data-name=\"\"><\u002Fdiv>\n      <div class=\"tw-desc\" data-desc=\"\"><\u002Fdiv>\n      <div class=\"tw-seg\">\n        <button data-val=\"journal\">Journal<\u002Fbutton>\n        <button data-val=\"engdoc\">Eng doc<\u002Fbutton>\n        <button data-val=\"marketing\">Marketing<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tw-group\" data-key=\"stain\">\n      <div class=\"tw-label\">Stain<\u002Fdiv>\n      <div class=\"tw-name\" data-name=\"\"><\u002Fdiv>\n      <div class=\"tw-desc\" data-desc=\"\"><\u002Fdiv>\n      <div class=\"tw-seg\">\n        <button data-val=\"parchment\">Parchment<\u002Fbutton>\n        <button data-val=\"blueprint\">Blueprint<\u002Fbutton>\n        <button data-val=\"carbon\">Carbon<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tw-group\" data-key=\"tempo\">\n      <div class=\"tw-label\">Tempo<\u002Fdiv>\n      <div class=\"tw-name\" data-name=\"\"><\u002Fdiv>\n      <div class=\"tw-desc\" data-desc=\"\"><\u002Fdiv>\n      <div class=\"tw-seg\">\n        <button data-val=\"cinematic\">Cinematic<\u002Fbutton>\n        <button data-val=\"default\">Default<\u002Fbutton>\n        <button data-val=\"snappy\">Snappy<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n(function () {\n  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n    \"manuscript\": \"journal\",\n    \"stain\": \"carbon\",\n    \"tempo\": \"default\"\n  }/*EDITMODE-END*/;\n\n  const META = {\n    manuscript: {\n      journal:   { name: 'Field journal',   desc: 'Fraunces serif body, mono in the margins. Reads like an engineer\\u2019s notebook.' },\n      engdoc:    { name: 'Engineering doc', desc: 'Mono everywhere, denser, italics swap for underlines. Feels like an RFC.' },\n      marketing: { name: 'Marketing site',  desc: 'Inter sans, tight headlines, ochre highlight pen. Feels like a launch page.' },\n    },\n    stain: {\n      parchment: { name: 'Parchment',  desc: 'Warm cream paper, ink blue, ochre accents. The default lived-in look.' },\n      blueprint: { name: 'Blueprint',  desc: 'Cool indigo paper, navy ink. Reads like an architectural drawing.' },\n      carbon:    { name: 'Carbon',     desc: 'Deep ink, bone text, amber accents. Late-night terminal mood.' },\n    },\n    tempo: {\n      cinematic: { name: 'Cinematic',  desc: 'Slow scrub. Day lingers, night settles in. ~2.5\\u00d7 the scroll distance.' },\n      default:   { name: 'Default',    desc: 'Original pacing. Day to dawn in roughly three viewports.' },\n      snappy:    { name: 'Snappy',     desc: 'Fast scrub. Read it like a flipbook \\u2014 day, night, done.' },\n    },\n  };\n  const TEMPO_VH = { cinematic: 800, default: 320, snappy: 160 };\n\n  const state = Object.assign({}, TWEAK_DEFAULTS);\n  const root = document.documentElement;\n\n  function applyAll() {\n    if (state.stain && state.stain !== 'parchment') root.setAttribute('data-stain', state.stain);\n    else root.removeAttribute('data-stain');\n\n    if (state.manuscript && state.manuscript !== 'journal') root.setAttribute('data-manuscript', state.manuscript);\n    else root.removeAttribute('data-manuscript');\n\n    root.style.setProperty('--pipe-tempo', String(TEMPO_VH[state.tempo] || 320));\n  }\n\n  function refreshUI() {\n    document.querySelectorAll('.tweaks-panel .tw-group').forEach(g => {\n      const key = g.dataset.key;\n      const val = state[key];\n      const meta = META[key][val] || {};\n      const nameEl = g.querySelector('[data-name]');\n      const descEl = g.querySelector('[data-desc]');\n      if (nameEl) nameEl.textContent = meta.name || val;\n      if (descEl) descEl.textContent = meta.desc || '';\n      g.querySelectorAll('.tw-seg button').forEach(b => {\n        b.classList.toggle('on', b.dataset.val === val);\n      });\n    });\n  }\n\n  applyAll();\n  refreshUI();\n\n  // Hook up segmented buttons\n  document.querySelectorAll('.tweaks-panel .tw-group').forEach(g => {\n    const key = g.dataset.key;\n    g.querySelectorAll('.tw-seg button').forEach(b => {\n      b.addEventListener('click', () => {\n        state[key] = b.dataset.val;\n        applyAll();\n        refreshUI();\n        try {\n          window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: b.dataset.val } }, '*');\n        } catch (_) {}\n      });\n    });\n  });\n\n  // Host protocol\n  const panel = document.getElementById('tweaks-panel');\n  const closeBtn = document.getElementById('tw-close');\n\n  window.addEventListener('message', (e) => {\n    const t = e && e.data && e.data.type;\n    if (t === '__activate_edit_mode') panel.classList.add('show');\n    else if (t === '__deactivate_edit_mode') panel.classList.remove('show');\n  });\n\n  closeBtn.addEventListener('click', () => {\n    panel.classList.remove('show');\n    try { window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); } catch (_) {}\n  });\n\n  try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (_) {}\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
