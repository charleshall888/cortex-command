# output-filters.conf — command detection patterns for the output filter hook
#
# Each non-comment, non-blank line is an ERE regex matched as a SUBSTRING
# against the full Bash command string via `grep -qE`. A pattern matches if
# it occurs anywhere in the command — no anchoring is implied.
#
# Conventions:
#   \b  — word boundary; use to avoid false positives (e.g., \bjest\b
#         prevents matching "jesting" or "majesty")
#   ^   — anchor to start of command when needed
#   |   — alternation within a single pattern
#
# Prefix-aware: patterns account for common invocation prefixes such as
# `uv run`, `python3 -m`, `npx`, path-prefixed binaries (.venv/bin/,
# ./node_modules/.bin/), and recipe runners (just, make).

# --- JavaScript / TypeScript ---
\bnpm test\b
\bnpx\s+jest\b
(^|/)jest\b
(\./)?node_modules/\.bin/jest\b

# --- Python ---
\bpytest\b
\bpython3?\s+-m\s+pytest\b
\buv\s+run\s+pytest\b
(^|/)\.venv/bin/pytest\b

# --- Rust ---
\bcargo\s+test\b

# --- Go ---
\bgo\s+test\b

# --- Recipe / task runners ---
\bjust\s+test\b
\bmake\s+test\b
