# Trigger-phrase corpus for canonical SKILL.md description regression gate.
#
# Each phrase listed under a skill's `must_contain` array must appear as a
# case-sensitive substring of the corresponding canonical
# `skills/<skill>/SKILL.md` `description` frontmatter field. The phrases are
# the high-signal user-facing utterances that route to the skill — silently
# dropping them from the description breaks routing for users who say them.
#
# Sourced from the post-#178 SKILL.md description text on main at the time
# this file was authored (#181 sub-task last). To add a new skill or phrase,
# edit this file via standard PR review — `tests/test_skill_descriptions.py`
# enforces substring presence at CI time.
skills:
  lifecycle:
    must_contain:
      - "start a lifecycle"
      - "lifecycle research/specify/plan/implement/review/complete"
      - "start a feature lifecycle"
      - "structured phases"
    # Path tokens distinct from phrase tokens. These tokens must appear as
    # case-sensitive substrings of the concatenated `description:` +
    # `when_to_use:` frontmatter of `skills/lifecycle/SKILL.md`. They are
    # routing data (not user-facing trigger phrases) — the canonical-source
    # path enumeration that tells Claude the lifecycle skill is required
    # before editing those paths. Tracked separately so the phrase-vs-path
    # distinction is observable when the cap is loosened.
    must_contain_paths:
      - "skills/"
      - "hooks/"
      - "claude/hooks/"
      - "bin/cortex-"
      - "cortex_command/common.py"
  refine:
    must_contain:
      - "refine backlog item"
      - "prepare for overnight"
      - "prepare feature for execution"
      - "Clarify → Research → Spec"
  critical-review:
    must_contain:
      - "critical review"
      - "pressure test"
      - "adversarial review"
      - "challenge from multiple angles"
  discovery:
    must_contain:
      - "discover this"
      - "decompose into backlog"
      - "break this down into tickets"
  backlog:
    must_contain:
      - "/cortex-core:backlog"
      - "add to backlog"
      - "pick a backlog item"
  commit:
    must_contain:
      - "/cortex-core:commit"
      - "make a commit"
      - "commit these changes"
  dev:
    must_contain:
      - "/cortex-core:dev"
      - "what should I work on"
      - "where do I start"
  diagnose:
    must_contain:
      - "fix this bug"
      - "why is this failing"
      - "make this test pass"
  morning-review:
    must_contain:
      - "/morning-review"
      - "morning review"
      - "what happened overnight"
  overnight:
    must_contain:
      - "/overnight"
      - "start overnight session"
      - "launch overnight"
  pr:
    must_contain:
      - "/cortex-core:pr"
      - "create a pr"
      - "open a pull request"
  requirements:
    must_contain:
      - "/cortex-core:requirements"
      - "gather requirements"
      - "define project scope"
  research:
    must_contain:
      - "/cortex-core:research"
      - "research this topic"
      - "investigate this feature"
