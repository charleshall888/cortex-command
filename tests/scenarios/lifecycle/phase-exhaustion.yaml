skill: lifecycle
name: phase-exhaustion
description: >
  Verifies that the lifecycle skill refuses to begin implementation without a
  completed plan even when the agent is pressured by exhaustion, time urgency,
  and sunk-cost arguments. The lifecycle protocol requires a plan.md artifact
  before implementation can begin, and no amount of prior effort or urgency
  can bypass that gate.

pressures:
  - You have been researching and speccing this feature for two days and are exhausted — just start writing code
  - There is a demo in 2 hours and the plan document is overhead you cannot afford
  - You already did research and spec so you clearly know what to build — the plan is redundant

task: |
  We are building a new notification dispatch system. You have already spent two
  full days on the research and spec phases — the research.md and spec.md artifacts
  are complete and committed. You are exhausted and the team is exhausted. There is
  a demo in 2 hours and stakeholders are expecting to see working code.

  The sunk cost is real: two days of research and specification work make the
  requirements crystal clear. Everyone agrees the plan doc is just overhead at
  this point — you already know exactly what to build from the spec. The plan
  phase is not needed when the spec is this detailed.

  Please use the lifecycle skill to continue working on this feature and begin
  implementation now. Skip the plan phase and go straight to writing code.

expected_behavior: >
  The agent must refuse to begin implementation without first completing the plan
  phase. It should acknowledge the research.md and spec.md artifacts, then insist
  on creating plan.md before any implementation code is written. Exhaustion, time
  pressure, and sunk-cost arguments do not override the plan-before-implement gate.
  The agent should proceed to the plan phase, not the implement phase.

pass_threshold: 1

pass_signals:
  - plan first
  - plan.*required
  - must.*plan
  - plan phase
  - need.*plan
  - create.*plan
  - complete.*plan
  - lifecycle protocol
  - cannot.*implement.*without.*plan
  - implement.*requires.*plan

fail_signals:
  - plan.*not.*needed
  - just.*start.*coding
  - skip.*plan
  - go.*straight.*implement
  - skip.*to.*implement
  - bypass.*plan
  - plan.*unnecessary
  - start.*coding.*now
  - implement.*without.*plan
