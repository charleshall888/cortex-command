# sync-allowlist.conf
#
# Glob patterns for files whose conflicts the post-merge rebase auto-resolves
# with `git checkout --theirs` during the morning review sync step.
#
# WHICH SIDE THAT KEEPS: the local one. Git swaps the ours/theirs nomenclature
# during a rebase — it checks out the upstream (remote) commits first and
# replays the local commits on top, so `--theirs` names the replayed side,
# i.e. LOCAL, and `--ours` names the remote. Auto-resolution therefore keeps
# the local revision and discards the remote one. See the Note in
# git-checkout(1). Do not "correct" this comment to say the remote side is the
# one kept: the flag name reads backwards here, and it has misled readers of
# this file before.
#
# Whether local is the side that *should* win is an open question, tracked
# separately; this file records what the code does, not an endorsement of it.
#
# One pattern per line. Lines starting with # are comments.
# Empty lines are ignored.
#
# Patterns are matched against git's REPO-RELATIVE conflict paths, so they
# must carry the `cortex/` umbrella prefix. Patterns ending in `/` are
# matched as literal directory prefixes (no globbing) — see
# cortex_command/git/sync_rebase.py::_matches_allowlist.
# tests/test_git_sync_rebase.py asserts every pattern below still matches a
# representative real path; a relocation that strands one fails that test.
#
# Every pattern must match at least one git-tracked file. A pattern that only
# matches gitignored or nonexistent paths can never resolve a real conflict,
# and reads as coverage that does not exist.

# Lifecycle phase outputs produced by feature branches
cortex/lifecycle/*/research.md
cortex/lifecycle/*/spec.md
cortex/lifecycle/*/plan.md

# Individual backlog item files (overnight status updates)
cortex/backlog/[0-9]*-*.md

# Deliberately NOT allowlisted: cortex/lifecycle/pipeline-events.log. It is
# append-only, so neither side of a conflict is correct — keeping either one
# discards the events the other appended. A union merge (.gitattributes
# `merge=union`) is what it would actually need. Until then, a conflict there
# aborts the rebase (exit 1) loudly rather than silently dropping events.
