# sync-allowlist.conf
#
# Glob patterns for files safe to auto-resolve with --theirs (remote wins)
# during post-merge rebase in the morning review sync step.
#
# One pattern per line. Lines starting with # are comments.
# Empty lines are ignored.
#
# Patterns are matched against git's REPO-RELATIVE conflict paths, so they
# must carry the `cortex/` umbrella prefix. Patterns ending in `/` are
# matched as literal directory prefixes (no globbing) — see
# cortex_command/git/sync_rebase.py::_matches_allowlist.
# tests/test_git_sync_rebase.py asserts every pattern below still matches a
# representative real path; a relocation that strands one fails that test.
#
# These patterns cover:
# - Overnight runner Phase D artifact commit files (runner.sh lines 986-993)
# - Morning report files (runner.sh lines 1208-1209)
# - Backlog item files with overnight status updates

# Session artifacts (batch results, strategy, etc.)
cortex/lifecycle/sessions/

# Lifecycle phase outputs produced by feature branches
cortex/lifecycle/*/research.md
cortex/lifecycle/*/spec.md
cortex/lifecycle/*/plan.md
cortex/lifecycle/*/agent-activity.jsonl

# Pipeline event log
cortex/lifecycle/pipeline-events.log

# Backlog index (regenerated after sync)
cortex/backlog/index.md

# Backlog archive (completed items moved by overnight)
cortex/backlog/archive/*

# Individual backlog item files (overnight status updates)
cortex/backlog/[0-9]*-*.md

# Morning report files
