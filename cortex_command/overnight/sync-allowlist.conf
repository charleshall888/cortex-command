# sync-allowlist.conf
#
# `<side> <pattern>` lines for files whose conflicts the post-merge rebase
# auto-resolves during the morning review sync step. `side` names the revision
# that SURVIVES a conflict on that pattern — the ADR-0029 per-pattern ruling:
#
#   remote — the merged pull request's revision wins; the local session copy
#            is discarded.
#   local  — the replayed session commit's revision wins; the merged pull
#            request's edits to that file are discarded.
#
# HOW THE SIDES MAP TO GIT FLAGS: git swaps the ours/theirs nomenclature
# during a rebase — it checks out the upstream (remote) commits first and
# replays the local commits on top, so `--theirs` names the replayed side,
# i.e. LOCAL, and `--ours` names the remote. See the Note in git-checkout(1)
# and cortex_command/git/sync_rebase.py::_SIDE_TO_CHECKOUT_FLAG. Do not
# "correct" that mapping: the flag names read backwards here, and they have
# misled readers of this file before.
#
# A line without a valid side is skipped with a warning and resolves nothing —
# a mis-edited entry fails safe (its conflicts abort the rebase loudly) rather
# than silently picking a side nobody ruled on.
#
# One `<side> <pattern>` pair per line. Lines starting with # are comments.
# Empty lines are ignored.
#
# Patterns are matched against git's REPO-RELATIVE conflict paths, so they
# must carry the `cortex/` umbrella prefix. Patterns ending in `/` are
# matched as literal directory prefixes (no globbing) — see
# cortex_command/git/sync_rebase.py::_resolve_side.
# tests/test_git_sync_rebase.py asserts every pattern below still matches a
# representative real path; a relocation that strands one fails that test.
#
# Every pattern must match at least one git-tracked file. A pattern that only
# matches gitignored or nonexistent paths can never resolve a real conflict,
# and reads as coverage that does not exist.

# Lifecycle phase outputs produced by feature branches: the merged pull
# request owns these — the reviewed, reconciled revision is authoritative,
# and a divergent local copy is stale by construction (ADR-0029).
remote cortex/lifecycle/*/research.md
remote cortex/lifecycle/*/spec.md
remote cortex/lifecycle/*/plan.md

# Individual backlog item files: the review's closes are the later,
# better-informed writes and must survive the sync — the post-sync content
# check depends on local session commits surviving (ADR-0029). The cost is
# that the overnight write-back's frontmatter edits to the same file are
# discarded; the close's terminal status supersedes them.
local cortex/backlog/[0-9]*-*.md

# Deliberately NOT allowlisted: cortex/lifecycle/pipeline-events.log. It is
# append-only, so neither side of a conflict is correct — keeping either one
# discards the events the other appended. A union merge (.gitattributes
# `merge=union`) is what it would actually need. Until then, a conflict there
# aborts the rebase (exit 1) loudly rather than silently dropping events.
